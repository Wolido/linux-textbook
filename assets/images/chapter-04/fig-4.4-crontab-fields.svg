<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" width="800" style="max-width:100%;height:auto;" preserveAspectRatio="xMidYMid meet">
  <title>crontab 五个时间字段</title>
  <desc>展示 crontab 定时任务中“分、时、日、月、星期”五个字段的排布顺序、取值范围和示例。</desc>

  <defs>
    <marker id="arrowhead" markerWidth="6" markerHeight="8" refX="0" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,1 L6,4 L0,7 Z" fill="#42a5f5"/>
    </marker>
  </defs>

  <!-- 页面背景 -->
  <rect width="800" height="360" fill="#fafafa"/>

  <!-- 标题 -->
  <text x="400" y="42" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="bold" fill="#0d47a1">crontab 时间字段：分 · 时 · 日 · 月 · 星期</text>

  <!-- 字段方框 -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Courier New', monospace" text-anchor="middle">
    <!-- 分 -->
    <rect x="90" y="80" width="110" height="70" rx="8" fill="#e3f2fd" stroke="#0d47a1" stroke-width="2"/>
    <text x="145" y="125" font-size="28" fill="#0d47a1">*</text>
    <text x="145" y="175" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="bold" fill="#333333">分</text>
    <text x="145" y="195" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#666666">0–59</text>

    <!-- 时 -->
    <rect x="220" y="80" width="110" height="70" rx="8" fill="#e3f2fd" stroke="#0d47a1" stroke-width="2"/>
    <text x="275" y="125" font-size="28" fill="#0d47a1">*</text>
    <text x="275" y="175" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="bold" fill="#333333">时</text>
    <text x="275" y="195" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#666666">0–23</text>

    <!-- 日 -->
    <rect x="350" y="80" width="110" height="70" rx="8" fill="#e3f2fd" stroke="#0d47a1" stroke-width="2"/>
    <text x="405" y="125" font-size="28" fill="#0d47a1">*</text>
    <text x="405" y="175" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="bold" fill="#333333">日</text>
    <text x="405" y="195" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#666666">1–31</text>

    <!-- 月 -->
    <rect x="480" y="80" width="110" height="70" rx="8" fill="#e3f2fd" stroke="#0d47a1" stroke-width="2"/>
    <text x="535" y="125" font-size="28" fill="#0d47a1">*</text>
    <text x="535" y="175" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="bold" fill="#333333">月</text>
    <text x="535" y="195" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#666666">1–12</text>

    <!-- 星期 -->
    <rect x="610" y="80" width="110" height="70" rx="8" fill="#e3f2fd" stroke="#0d47a1" stroke-width="2"/>
    <text x="665" y="125" font-size="28" fill="#0d47a1">*</text>
    <text x="665" y="175" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="bold" fill="#333333">星期</text>
    <text x="665" y="195" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#666666">0–7（0/7=周日）</text>
  </g>

  <!-- 顺序箭头 -->
  <g stroke="#42a5f5" stroke-width="2" fill="none" stroke-linecap="round">
    <line x1="200" y1="115" x2="214" y2="115" marker-end="url(#arrowhead)"/>
    <line x1="330" y1="115" x2="344" y2="115" marker-end="url(#arrowhead)"/>
    <line x1="460" y1="115" x2="474" y2="115" marker-end="url(#arrowhead)"/>
    <line x1="590" y1="115" x2="604" y2="115" marker-end="url(#arrowhead)"/>
  </g>

  <!-- 示例命令条 -->
  <rect x="90" y="245" width="620" height="54" rx="6" fill="#1e1e1e"/>
  <text x="115" y="280" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Courier New', monospace" font-size="16" fill="#4caf50">0 2 * * *</text>
  <text x="220" y="280" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Courier New', monospace" font-size="16" fill="#e0e0e0"> /home/student/backup.sh</text>

  <!-- 示例说明 -->
  <text x="400" y="330" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#666666">示例：每天凌晨 2:00 执行备份脚本</text>
</svg>

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 370" width="800" style="max-width:100%;height:auto;" preserveAspectRatio="xMidYMid meet">
  <title>tar 打包与 gzip 压缩的两步流程</title>
  <desc>展示 tar 负责打包、gzip 负责压缩的两步流程，以及一条命令同时完成打包与压缩的写法。</desc>

  <defs>
    <marker id="arrowhead" markerWidth="6" markerHeight="8" refX="0" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L6,4 L0,8 Z" fill="#0d47a1"/>
    </marker>
  </defs>

  <!-- 页面背景 -->
  <rect width="800" height="370" fill="#fafafa"/>

  <!-- 标题 -->
  <text x="400" y="40" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="bold" fill="#0d47a1">tar 打包 + gzip 压缩的两步流程</text>

  <!-- 源目录 -->
  <rect x="70" y="100" width="140" height="120" rx="8" fill="#e3f2fd" stroke="#0d47a1" stroke-width="2"/>
  <!-- 文件夹标签 -->
  <path d="M70,126 L110,126 L120,110 L210,110 L210,126 Z" fill="#bbdefb" stroke="#0d47a1" stroke-width="2"/>
  <text x="140" y="145" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="bold" fill="#0d47a1">项目目录</text>
  <!-- 文件图标 -->
  <rect x="95" y="160" width="36" height="44" rx="3" fill="#ffffff" stroke="#42a5f5" stroke-width="1.5"/>
  <rect x="145" y="160" width="36" height="44" rx="3" fill="#ffffff" stroke="#42a5f5" stroke-width="1.5"/>
  <rect x="120" y="170" width="36" height="44" rx="3" fill="#ffffff" stroke="#42a5f5" stroke-width="1.5"/>

  <!-- tar 打包 -->
  <rect x="260" y="125" width="130" height="70" rx="8" fill="#1565c0"/>
  <text x="325" y="158" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Courier New', monospace" font-size="16" fill="#ffffff">tar -c</text>
  <text x="325" y="180" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#e3f2fd">打包（归档）</text>

  <!-- gzip 压缩 -->
  <rect x="440" y="125" width="130" height="70" rx="8" fill="#1565c0"/>
  <text x="505" y="158" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Courier New', monospace" font-size="16" fill="#ffffff">gzip</text>
  <text x="505" y="180" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#e3f2fd">压缩</text>

  <!-- 最终归档 -->
  <rect x="620" y="100" width="130" height="120" rx="8" fill="#ffffff" stroke="#ef5350" stroke-width="2"/>
  <!-- 折叠角 -->
  <path d="M720,100 L750,130 L720,130 Z" fill="#ef5350"/>
  <line x1="720" y1="100" x2="720" y2="130" stroke="#ef5350" stroke-width="2"/>
  <line x1="720" y1="130" x2="750" y2="130" stroke="#ef5350" stroke-width="2"/>
  <text x="685" y="170" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Courier New', monospace" font-size="15" fill="#0d47a1">project</text>
  <text x="685" y="190" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Courier New', monospace" font-size="15" fill="#0d47a1">.tar.gz</text>

  <!-- 箭头 1：打包 -->
  <line x1="210" y1="160" x2="254" y2="160" stroke="#0d47a1" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="235" y="144" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#333333">打包</text>

  <!-- 箭头 2：压缩 -->
  <line x1="390" y1="160" x2="434" y2="160" stroke="#0d47a1" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="415" y="144" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#333333">压缩</text>

  <!-- 箭头 3：输出 -->
  <line x1="570" y1="160" x2="614" y2="160" stroke="#0d47a1" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="595" y="144" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#333333">生成</text>

  <!-- 底部合并命令 -->
  <rect x="130" y="260" width="540" height="50" rx="6" fill="#1e1e1e"/>
  <text x="400" y="291" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Courier New', monospace" font-size="16" fill="#e0e0e0">tar -czf project.tar.gz ~/project/</text>
  <text x="400" y="325" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#666666">一条命令同时完成打包与压缩</text>
</svg>

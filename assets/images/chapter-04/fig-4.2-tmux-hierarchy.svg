<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 545" width="800" style="max-width:100%;height:auto;" preserveAspectRatio="xMidYMid meet">
  <title>tmux 的 session、window、pane 层级关系</title>
  <desc>用俄罗斯套娃式结构展示 tmux 的 session、window 和 pane 三层关系，以及每个 pane 中可运行的典型命令。</desc>

  <!-- 页面背景 -->
  <rect width="800" height="545" fill="#fafafa"/>

  <!-- 标题 -->
  <text x="400" y="42" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="bold" fill="#0d47a1">tmux 的层级结构：session ⊃ window ⊃ pane</text>

  <!-- session 层 -->
  <rect x="100" y="64" width="600" height="410" rx="12" fill="#e3f2fd" stroke="#0d47a1" stroke-width="2"/>
  <text x="400" y="92" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="bold" fill="#0d47a1">session（会话）</text>
  <text x="600" y="92" text-anchor="end" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#1565c0">可包含多个 window</text>

  <!-- window 层 -->
  <rect x="150" y="118" width="500" height="340" rx="10" fill="#ffffff" stroke="#1565c0" stroke-width="2"/>
  <text x="400" y="144" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="bold" fill="#1565c0">window（窗口）</text>
  <text x="620" y="144" text-anchor="end" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#42a5f5">可拆分为多个 pane</text>

  <!-- pane 标签 -->
  <text x="400" y="172" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#333333">pane（窗格）</text>

  <!-- pane 网格 -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Courier New', monospace" font-size="13" text-anchor="middle">
    <!-- 左上 -->
    <rect x="180" y="186" width="210" height="120" rx="6" fill="#f5f5f5" stroke="#42a5f5" stroke-width="2"/>
    <text x="285" y="235" fill="#0d47a1">python train.py</text>
    <text x="285" y="255" fill="#666666" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14">训练任务</text>

    <!-- 右上 -->
    <rect x="410" y="186" width="210" height="120" rx="6" fill="#f5f5f5" stroke="#42a5f5" stroke-width="2"/>
    <text x="515" y="230" fill="#0d47a1">watch -n 1</text>
    <text x="515" y="252" fill="#0d47a1">nvidia-smi</text>

    <!-- 左下 -->
    <rect x="180" y="326" width="210" height="120" rx="6" fill="#f5f5f5" stroke="#42a5f5" stroke-width="2"/>
    <text x="285" y="385" fill="#0d47a1">htop</text>

    <!-- 右下 -->
    <rect x="410" y="326" width="210" height="120" rx="6" fill="#f5f5f5" stroke="#42a5f5" stroke-width="2"/>
    <text x="515" y="385" fill="#0d47a1">vim config.yaml</text>
  </g>

  <!-- 底部说明 -->
  <text x="400" y="502" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#666666">一个 session 可包含多个 window，一个 window 可拆分为多个 pane，任务在 pane 中运行</text>
</svg>

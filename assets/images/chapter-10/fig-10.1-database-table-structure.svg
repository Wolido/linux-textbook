<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" width="800" style="max-width:100%;height:auto;" preserveAspectRatio="xMidYMid meet">
  <title>关系型数据库表结构示意</title>
  <desc>展示一张材料数据表，包含表头和若干行数据，并标注出行（row）与列（column）的概念。</desc>

  <rect width="800" height="440" fill="#fafafa"/>

  <text x="400" y="42" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" font-weight="bold" fill="#0d47a1">关系型数据库表结构示意</text>

  <!-- 表格外框 -->
  <g transform="translate(70, 100)">
    <!-- 表头背景 -->
    <rect x="0" y="0" width="660" height="42" rx="6" fill="#0d47a1"/>
    <!-- 表头文字 -->
    <text x="35" y="27" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="bold" fill="#ffffff">id</text>
    <text x="145" y="27" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="bold" fill="#ffffff">name</text>
    <text x="300" y="27" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="bold" fill="#ffffff">formula</text>
    <text x="435" y="27" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="bold" fill="#ffffff">density</text>
    <text x="575" y="27" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="bold" fill="#ffffff">notes</text>

    <!-- 垂直分隔线 -->
    <line x1="70" y1="0" x2="70" y2="252" stroke="#1565c0" stroke-width="1"/>
    <line x1="220" y1="0" x2="220" y2="252" stroke="#1565c0" stroke-width="1"/>
    <line x1="380" y1="0" x2="380" y2="252" stroke="#1565c0" stroke-width="1"/>
    <line x1="490" y1="0" x2="490" y2="252" stroke="#1565c0" stroke-width="1"/>

    <!-- 数据行 -->
    <rect x="0" y="42" width="660" height="42" fill="#ffffff" stroke="#e3f2fd" stroke-width="1"/>
    <rect x="0" y="84" width="660" height="42" fill="#e3f2fd" stroke="#e3f2fd" stroke-width="1"/>
    <rect x="0" y="126" width="660" height="42" fill="#ffffff" stroke="#e3f2fd" stroke-width="1"/>
    <rect x="0" y="168" width="660" height="42" fill="#e3f2fd" stroke="#e3f2fd" stroke-width="1"/>
    <rect x="0" y="210" width="660" height="42" fill="#ffffff" stroke="#e3f2fd" stroke-width="1"/>

    <!-- 数据文字 -->
    <g font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="#0d47a1">
      <text x="35" y="70" text-anchor="middle">1</text>
      <text x="145" y="70" text-anchor="middle">Silicon</text>
      <text x="300" y="70" text-anchor="middle">Si</text>
      <text x="435" y="70" text-anchor="middle">2.33</text>
      <text x="575" y="70" text-anchor="middle">半导体材料</text>

      <text x="35" y="112" text-anchor="middle">2</text>
      <text x="145" y="112" text-anchor="middle">Aluminum</text>
      <text x="300" y="112" text-anchor="middle">Al</text>
      <text x="435" y="112" text-anchor="middle">2.70</text>
      <text x="575" y="112" text-anchor="middle">轻质金属</text>

      <text x="35" y="154" text-anchor="middle">3</text>
      <text x="145" y="154" text-anchor="middle">Titanium alloy</text>
      <text x="300" y="154" text-anchor="middle">Ti-6Al-4V</text>
      <text x="435" y="154" text-anchor="middle">4.43</text>
      <text x="575" y="154" text-anchor="middle">航空常用</text>

      <text x="35" y="196" text-anchor="middle">4</text>
      <text x="145" y="196" text-anchor="middle">Iron</text>
      <text x="300" y="196" text-anchor="middle">Fe</text>
      <text x="435" y="196" text-anchor="middle">7.87</text>
      <text x="575" y="196" text-anchor="middle">结构材料</text>

      <text x="35" y="238" text-anchor="middle">5</text>
      <text x="145" y="238" text-anchor="middle">Graphene</text>
      <text x="300" y="238" text-anchor="middle">C</text>
      <text x="435" y="238" text-anchor="middle">—</text>
      <text x="575" y="238" text-anchor="middle">二维材料</text>
    </g>

    <!-- 表格外边框 -->
    <rect x="0" y="0" width="660" height="252" rx="6" fill="none" stroke="#1565c0" stroke-width="2"/>
  </g>

  <!-- 列标注 -->
  <g transform="translate(70, 78)">
    <path d="M10,0 L10,14 L650,14 L650,0" fill="none" stroke="#ef5350" stroke-width="2"/>
    <text x="330" y="-10" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="bold" fill="#ef5350">列（column）</text>
  </g>

  <!-- 行标注 -->
  <g transform="translate(30, 142)">
    <path d="M14,0 L0,0 L0,210 L14,210" fill="none" stroke="#ef5350" stroke-width="2"/>
    <text x="7" y="-26" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="bold" fill="#ef5350">行</text>
    <text x="7" y="-8" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="bold" fill="#ef5350">（row）</text>
  </g>

  <!-- 底部说明 -->
  <text x="400" y="410" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="#666666">表由行和列组成：每行是一条记录，每列是记录的一个属性（字段）</text>
</svg>

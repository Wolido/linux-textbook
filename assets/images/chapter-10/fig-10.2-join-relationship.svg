<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 720" width="800" style="max-width:100%;height:auto;" preserveAspectRatio="xMidYMid meet">
  <title>主外键关系与 JOIN 示意</title>
  <desc>展示样品表与性能测试表之间的外键关系，以及 INNER JOIN 与 LEFT JOIN 的结果差异。</desc>

  <defs>
    <marker id="arrow-10.2" markerWidth="8" markerHeight="10" refX="0" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,5 L0,10 Z" fill="#0d47a1"/>
    </marker>
  </defs>

  <rect width="800" height="720" fill="#fafafa"/>

  <text x="400" y="42" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" font-weight="bold" fill="#0d47a1">主外键关系与 JOIN 示意</text>

  <!-- 样品表 -->
  <g transform="translate(90, 110)">
    <rect width="240" height="170" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="2"/>
    <rect width="240" height="40" rx="8" fill="#1565c0"/>
    <rect x="0" y="32" width="240" height="8" fill="#1565c0"/>
    <text x="120" y="26" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="bold" fill="#ffffff">样品表（samples）</text>

    <!-- 表头列 -->
    <rect x="0" y="40" width="60" height="34" fill="#0d47a1"/>
    <rect x="60" y="40" width="180" height="34" fill="#0d47a1"/>
    <text x="30" y="62" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Courier New',monospace" font-size="14" font-weight="bold" fill="#ffffff">id</text>
    <text x="150" y="62" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Courier New',monospace" font-size="14" font-weight="bold" fill="#ffffff">sample_name</text>

    <!-- 数据行 -->
    <rect x="0" y="74" width="240" height="32" fill="#ffffff"/>
    <rect x="0" y="106" width="240" height="32" fill="#e3f2fd"/>
    <rect x="0" y="138" width="240" height="32" fill="#ffffff"/>

    <line x1="60" y1="40" x2="60" y2="170" stroke="#1565c0" stroke-width="1"/>

    <text x="30" y="95" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Courier New',monospace" font-size="14" fill="#0d47a1">1</text>
    <text x="150" y="95" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="#0d47a1">Si 单晶</text>

    <text x="30" y="127" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Courier New',monospace" font-size="14" fill="#0d47a1">2</text>
    <text x="150" y="127" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="#0d47a1">Al 箔</text>

    <text x="30" y="159" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Courier New',monospace" font-size="14" fill="#0d47a1">3</text>
    <text x="150" y="159" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="#0d47a1">Ti 合金</text>

    <rect width="240" height="170" rx="8" fill="none" stroke="#1565c0" stroke-width="2"/>
  </g>

  <!-- 性能测试表 -->
  <g transform="translate(470, 110)">
    <rect width="280" height="218" rx="8" fill="#ffffff" stroke="#0d47a1" stroke-width="2"/>
    <rect width="280" height="40" rx="8" fill="#0d47a1"/>
    <rect x="0" y="32" width="280" height="8" fill="#0d47a1"/>
    <text x="140" y="26" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="bold" fill="#ffffff">性能测试表（tests）</text>

    <!-- 表头列 -->
    <rect x="0" y="40" width="60" height="34" fill="#1565c0"/>
    <rect x="60" y="40" width="80" height="34" fill="#1565c0"/>
    <rect x="140" y="40" width="80" height="34" fill="#1565c0"/>
    <rect x="220" y="40" width="60" height="34" fill="#1565c0"/>
    <text x="30" y="62" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Courier New',monospace" font-size="14" font-weight="bold" fill="#ffffff">id</text>
    <text x="100" y="62" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Courier New',monospace" font-size="14" font-weight="bold" fill="#ffffff">sample_id</text>
    <text x="180" y="62" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Courier New',monospace" font-size="14" font-weight="bold" fill="#ffffff">property</text>
    <text x="250" y="62" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Courier New',monospace" font-size="14" font-weight="bold" fill="#ffffff">value</text>

    <!-- 数据行 -->
    <rect x="0" y="74" width="280" height="36" fill="#ffffff"/>
    <rect x="0" y="110" width="280" height="36" fill="#e3f2fd"/>
    <rect x="0" y="146" width="280" height="36" fill="#ffffff"/>
    <rect x="0" y="182" width="280" height="36" fill="#e3f2fd"/>

    <line x1="60" y1="40" x2="60" y2="218" stroke="#1565c0" stroke-width="1"/>
    <line x1="140" y1="40" x2="140" y2="218" stroke="#1565c0" stroke-width="1"/>
    <line x1="220" y1="40" x2="220" y2="218" stroke="#1565c0" stroke-width="1"/>

    <text x="30" y="98" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Courier New',monospace" font-size="14" fill="#0d47a1">101</text>
    <text x="100" y="98" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Courier New',monospace" font-size="14" fill="#0d47a1">1</text>
    <text x="180" y="98" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="#0d47a1">密度</text>
    <text x="250" y="98" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Courier New',monospace" font-size="14" fill="#0d47a1">2.33</text>

    <text x="30" y="134" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Courier New',monospace" font-size="14" fill="#0d47a1">102</text>
    <text x="100" y="134" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Courier New',monospace" font-size="14" fill="#0d47a1">1</text>
    <text x="180" y="134" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="#0d47a1">硬度</text>
    <text x="250" y="134" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Courier New',monospace" font-size="14" fill="#0d47a1">6.5</text>

    <text x="30" y="170" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Courier New',monospace" font-size="14" fill="#0d47a1">103</text>
    <text x="100" y="170" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Courier New',monospace" font-size="14" fill="#0d47a1">2</text>
    <text x="180" y="170" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="#0d47a1">密度</text>
    <text x="250" y="170" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Courier New',monospace" font-size="14" fill="#0d47a1">2.70</text>

    <text x="30" y="206" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Courier New',monospace" font-size="14" fill="#0d47a1">104</text>
    <text x="100" y="206" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Courier New',monospace" font-size="14" fill="#0d47a1">4</text>
    <text x="180" y="206" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="#0d47a1">密度</text>
    <text x="250" y="206" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Courier New',monospace" font-size="14" fill="#0d47a1">7.87</text>

    <rect width="280" height="218" rx="8" fill="none" stroke="#0d47a1" stroke-width="2"/>
  </g>

  <!-- 外键箭头：从 tests.sample_id 指向 samples.id -->
  <line x1="470" y1="220" x2="338" y2="220" stroke="#0d47a1" stroke-width="2" marker-end="url(#arrow-10.2)"/>

  <!-- 外键标注 -->
  <g transform="translate(400, 200)">
    <rect x="-56" y="-32" width="112" height="44" rx="6" fill="#fff3e0" stroke="#ef5350" stroke-width="1"/>
    <text x="0" y="-14" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="#ef5350">外键：</text>
    <text x="0" y="4" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="#ef5350">sample_id → id</text>
  </g>

  <!-- 分隔说明 -->
  <text x="400" y="380" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="bold" fill="#0d47a1">JOIN 查询结果对比</text>

  <!-- INNER JOIN 结果 -->
  <g transform="translate(70, 410)">
    <text x="150" y="-14" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="bold" fill="#1565c0">INNER JOIN</text>
    <rect width="300" height="158" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="2"/>

    <rect width="300" height="36" rx="8" fill="#1565c0"/>
    <rect x="0" y="28" width="300" height="8" fill="#1565c0"/>
    <text x="75" y="22" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Courier New',monospace" font-size="13" font-weight="bold" fill="#ffffff">sample_name</text>
    <text x="195" y="22" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Courier New',monospace" font-size="13" font-weight="bold" fill="#ffffff">property</text>
    <text x="270" y="22" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Courier New',monospace" font-size="13" font-weight="bold" fill="#ffffff">value</text>

    <line x1="150" y1="36" x2="150" y2="158" stroke="#1565c0" stroke-width="1"/>
    <line x1="240" y1="36" x2="240" y2="158" stroke="#1565c0" stroke-width="1"/>

    <rect x="0" y="36" width="300" height="40" fill="#ffffff"/>
    <rect x="0" y="76" width="300" height="40" fill="#e3f2fd"/>
    <rect x="0" y="116" width="300" height="42" fill="#ffffff"/>

    <text x="75" y="62" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="#0d47a1">Si 单晶</text>
    <text x="195" y="62" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="#0d47a1">密度</text>
    <text x="270" y="62" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Courier New',monospace" font-size="14" fill="#0d47a1">2.33</text>

    <text x="75" y="102" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="#0d47a1">Si 单晶</text>
    <text x="195" y="102" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="#0d47a1">硬度</text>
    <text x="270" y="102" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Courier New',monospace" font-size="14" fill="#0d47a1">6.5</text>

    <text x="75" y="143" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="#0d47a1">Al 箔</text>
    <text x="195" y="143" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="#0d47a1">密度</text>
    <text x="270" y="143" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Courier New',monospace" font-size="14" fill="#0d47a1">2.70</text>

    <rect width="300" height="158" rx="8" fill="none" stroke="#1565c0" stroke-width="2"/>
  </g>

  <!-- LEFT JOIN 结果 -->
  <g transform="translate(430, 410)">
    <text x="150" y="-14" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="bold" fill="#0d47a1">LEFT JOIN</text>
    <rect width="300" height="198" rx="8" fill="#ffffff" stroke="#0d47a1" stroke-width="2"/>

    <rect width="300" height="36" rx="8" fill="#0d47a1"/>
    <rect x="0" y="28" width="300" height="8" fill="#0d47a1"/>
    <text x="75" y="22" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Courier New',monospace" font-size="13" font-weight="bold" fill="#ffffff">sample_name</text>
    <text x="195" y="22" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Courier New',monospace" font-size="13" font-weight="bold" fill="#ffffff">property</text>
    <text x="270" y="22" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Courier New',monospace" font-size="13" font-weight="bold" fill="#ffffff">value</text>

    <line x1="150" y1="36" x2="150" y2="198" stroke="#0d47a1" stroke-width="1"/>
    <line x1="240" y1="36" x2="240" y2="198" stroke="#0d47a1" stroke-width="1"/>

    <rect x="0" y="36" width="300" height="40" fill="#ffffff"/>
    <rect x="0" y="76" width="300" height="40" fill="#e3f2fd"/>
    <rect x="0" y="116" width="300" height="40" fill="#ffffff"/>
    <rect x="0" y="156" width="300" height="42" fill="#fff3e0"/>

    <text x="75" y="62" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="#0d47a1">Si 单晶</text>
    <text x="195" y="62" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="#0d47a1">密度</text>
    <text x="270" y="62" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Courier New',monospace" font-size="14" fill="#0d47a1">2.33</text>

    <text x="75" y="102" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="#0d47a1">Si 单晶</text>
    <text x="195" y="102" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="#0d47a1">硬度</text>
    <text x="270" y="102" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Courier New',monospace" font-size="14" fill="#0d47a1">6.5</text>

    <text x="75" y="143" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="#0d47a1">Al 箔</text>
    <text x="195" y="143" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="#0d47a1">密度</text>
    <text x="270" y="143" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Courier New',monospace" font-size="14" fill="#0d47a1">2.70</text>

    <text x="75" y="183" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="#0d47a1">Ti 合金</text>
    <text x="195" y="183" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Courier New',monospace" font-size="14" fill="#ef5350">NULL</text>
    <text x="270" y="183" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Courier New',monospace" font-size="14" fill="#ef5350">NULL</text>

    <rect width="300" height="198" rx="8" fill="none" stroke="#0d47a1" stroke-width="2"/>
  </g>

  <!-- 底部说明 -->
  <text x="400" y="650" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="#666666">INNER JOIN 只返回两表匹配的行；LEFT JOIN 保留左表所有行，未匹配时右表字段为 NULL</text>
</svg>

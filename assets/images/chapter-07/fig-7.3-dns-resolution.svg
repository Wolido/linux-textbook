<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 448" width="800" style="max-width:100%;height:auto;" preserveAspectRatio="xMidYMid meet">
  <title>DNS 解析流程</title>
  <desc>展示从浏览器发起域名查询，经本地 DNS、递归 DNS 到权威 DNS，最终返回 IP 的简化流程。</desc>

  <defs>
    <marker id="arrow-7.3-primary" markerWidth="8" markerHeight="10" refX="0" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,5 L0,10 Z" fill="#0d47a1"/>
    </marker>
    <marker id="arrow-7.3-accent" markerWidth="8" markerHeight="10" refX="0" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,5 L0,10 Z" fill="#ef5350"/>
    </marker>
  </defs>

  <rect width="800" height="448" fill="#fafafa"/>

  <text x="400" y="42" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" font-weight="bold" fill="#0d47a1">DNS 解析流程</text>

  <!-- 浏览器/客户端 -->
  <g transform="translate(140,210)">
    <rect x="-75" y="-40" width="150" height="80" rx="8" fill="#42a5f5"/>
    <text x="0" y="-2" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="bold" fill="#ffffff">浏览器 / 客户端</text>
    <text x="0" y="22" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Courier New',monospace" font-size="13" fill="#ffffff">example.com?</text>
  </g>

  <!-- 本地 DNS -->
  <g transform="translate(320,210)">
    <rect x="-75" y="-40" width="150" height="80" rx="8" fill="#1565c0"/>
    <text x="0" y="6" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="16" font-weight="bold" fill="#ffffff">本地 DNS</text>
  </g>

  <!-- 递归 DNS -->
  <g transform="translate(500,210)">
    <rect x="-75" y="-40" width="150" height="80" rx="8" fill="#0d47a1"/>
    <text x="0" y="6" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="16" font-weight="bold" fill="#ffffff">递归 DNS</text>
  </g>

  <!-- 权威 DNS -->
  <g transform="translate(680,210)">
    <rect x="-75" y="-40" width="150" height="80" rx="8" fill="#ef5350"/>
    <text x="0" y="6" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="16" font-weight="bold" fill="#ffffff">权威 DNS</text>
  </g>

  <!-- 正向查询箭头 -->
  <line x1="215" y1="210" x2="237" y2="210" stroke="#0d47a1" stroke-width="2" marker-end="url(#arrow-7.3-primary)"/>
  <line x1="395" y1="210" x2="417" y2="210" stroke="#0d47a1" stroke-width="2" marker-end="url(#arrow-7.3-primary)"/>
  <line x1="575" y1="210" x2="597" y2="210" stroke="#0d47a1" stroke-width="2" marker-end="url(#arrow-7.3-primary)"/>

  <text x="230" y="155" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="#0d47a1">查询 example.com</text>
  <text x="410" y="155" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="#0d47a1">递归查询</text>
  <text x="590" y="155" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="#0d47a1">请求 A 记录</text>

  <!-- 返回 IP 箭头 -->
  <path d="M680,250 L680,330 L140,330 L140,258" fill="none" stroke="#ef5350" stroke-width="2" marker-end="url(#arrow-7.3-accent)"/>
  <text x="410" y="320" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Courier New',monospace" font-size="14" fill="#ef5350">返回 IP 93.184.216.34</text>

  <text x="400" y="405" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="#666666">权威 DNS 返回 IP 后，沿原路传回客户端</text>
</svg>

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 536" width="800" style="max-width:100%;height:auto;" preserveAspectRatio="xMidYMid meet">
  <title>TCP/IP 分层与数据封装</title>
  <desc>展示 TCP/IP 四层模型：应用层、传输层、网络层、链路层，以及每层对应的协议与数据单元。</desc>

  <defs>
    <marker id="arrow-7.1" markerWidth="8" markerHeight="10" refX="0" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,5 L0,10 Z" fill="#0d47a1"/>
    </marker>
  </defs>

  <rect width="800" height="536" fill="#fafafa"/>

  <text x="400" y="42" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" font-weight="bold" fill="#0d47a1">TCP/IP 分层与数据封装</text>

  <!-- 应用层 -->
  <g transform="translate(400,135)">
    <rect x="-110" y="-35" width="220" height="70" rx="8" fill="#42a5f5"/>
    <text x="0" y="-2" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="16" font-weight="bold" fill="#ffffff">应用层 Application</text>
    <text x="0" y="22" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="#ffffff">HTTP / 数据（Data）</text>
  </g>

  <!-- 传输层 -->
  <g transform="translate(400,231)">
    <rect x="-110" y="-35" width="220" height="70" rx="8" fill="#1565c0"/>
    <text x="0" y="-2" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="16" font-weight="bold" fill="#ffffff">传输层 Transport</text>
    <text x="0" y="22" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="#ffffff">TCP / 段（Segment）</text>
  </g>

  <!-- 网络层 -->
  <g transform="translate(400,327)">
    <rect x="-110" y="-35" width="220" height="70" rx="8" fill="#0d47a1"/>
    <text x="0" y="-2" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="16" font-weight="bold" fill="#ffffff">网络层 Network</text>
    <text x="0" y="22" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="#ffffff">IP / 包（Packet）</text>
  </g>

  <!-- 链路层 -->
  <g transform="translate(400,423)">
    <rect x="-110" y="-35" width="220" height="70" rx="8" fill="#e3f2fd" stroke="#0d47a1" stroke-width="2"/>
    <text x="0" y="-2" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="16" font-weight="bold" fill="#0d47a1">链路层 Link</text>
    <text x="0" y="22" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="#0d47a1">Ethernet / 帧（Frame）</text>
  </g>

  <!-- 向下箭头 -->
  <line x1="400" y1="170" x2="400" y2="188" stroke="#0d47a1" stroke-width="2" marker-end="url(#arrow-7.1)"/>
  <line x1="400" y1="266" x2="400" y2="284" stroke="#0d47a1" stroke-width="2" marker-end="url(#arrow-7.1)"/>
  <line x1="400" y1="362" x2="400" y2="380" stroke="#0d47a1" stroke-width="2" marker-end="url(#arrow-7.1)"/>

  <text x="400" y="485" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="#666666">发送方自上而下逐层封装；接收方自下而上逐层解封装</text>
</svg>

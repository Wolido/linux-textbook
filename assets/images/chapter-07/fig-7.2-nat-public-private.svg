<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 448" width="800" style="max-width:100%;height:auto;" preserveAspectRatio="xMidYMid meet">
  <title>公网 IP、私网 IP 与 NAT 关系</title>
  <desc>展示私有网络中的多台设备通过 NAT 路由器共享同一个公网 IP 访问互联网。</desc>

  <defs>
    <marker id="arrow-7.2" markerWidth="8" markerHeight="10" refX="0" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,5 L0,10 Z" fill="#0d47a1"/>
    </marker>
  </defs>

  <rect width="800" height="448" fill="#fafafa"/>

  <text x="400" y="42" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" font-weight="bold" fill="#0d47a1">公网 IP、私网 IP 与 NAT 关系</text>

  <!-- 私网容器 -->
  <rect x="44" y="100" width="240" height="260" rx="12" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="164" y="126" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="bold" fill="#0d47a1">私有网络（192.168.1.0/24）</text>

  <!-- 私网设备 -->
  <g transform="translate(164,170)">
    <rect x="-80" y="-24" width="160" height="48" rx="8" fill="#1565c0"/>
    <text x="0" y="-2" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="bold" fill="#ffffff">笔记本</text>
    <text x="0" y="18" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Courier New',monospace" font-size="13" fill="#e3f2fd">192.168.1.2</text>
  </g>

  <g transform="translate(164,230)">
    <rect x="-80" y="-24" width="160" height="48" rx="8" fill="#1565c0"/>
    <text x="0" y="-2" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="bold" fill="#ffffff">服务器</text>
    <text x="0" y="18" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Courier New',monospace" font-size="13" fill="#e3f2fd">192.168.1.3</text>
  </g>

  <g transform="translate(164,290)">
    <rect x="-80" y="-24" width="160" height="48" rx="8" fill="#1565c0"/>
    <text x="0" y="-2" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="bold" fill="#ffffff">手机</text>
    <text x="0" y="18" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Courier New',monospace" font-size="13" fill="#e3f2fd">192.168.1.4</text>
  </g>

  <!-- NAT / 路由器 -->
  <g transform="translate(455,230)">
    <rect x="-75" y="-40" width="150" height="80" rx="10" fill="#0d47a1"/>
    <text x="0" y="-2" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="16" font-weight="bold" fill="#ffffff">NAT / 路由器</text>
    <text x="0" y="22" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Courier New',monospace" font-size="13" fill="#e3f2fd">203.0.113.1</text>
  </g>

  <!-- 互联网 -->
  <g transform="translate(690,230)">
    <rect x="-64" y="-64" width="128" height="128" rx="64" fill="#42a5f5"/>
    <text x="0" y="-2" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" font-weight="bold" fill="#ffffff">Internet</text>
    <text x="0" y="24" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="#ffffff">公网</text>
  </g>

  <!-- 箭头 -->
  <line x1="284" y1="230" x2="372" y2="230" stroke="#0d47a1" stroke-width="2" marker-end="url(#arrow-7.2)"/>
  <line x1="530" y1="230" x2="618" y2="230" stroke="#0d47a1" stroke-width="2" marker-end="url(#arrow-7.2)"/>

  <text x="332" y="250" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="#0d47a1">多个私网地址</text>
  <text x="578" y="250" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="#0d47a1">共享公网 IP</text>

  <text x="400" y="405" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="#666666">NAT 把多个私网 IP 映射到同一个公网 IP，实现共享上网</text>
</svg>

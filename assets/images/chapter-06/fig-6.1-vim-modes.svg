<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" width="800" style="max-width:100%;height:auto;" preserveAspectRatio="xMidYMid meet">
  <title>Vim 的三种模式及切换按键</title>
  <desc>展示 Vim 的 Normal（普通模式）、Insert（插入模式）、Command-line（命令模式）三种状态，以及 i、a、o、Esc、:、:q、:wq 等切换与退出按键。</desc>

  <defs>
    <marker id="arrow-blue" markerWidth="8" markerHeight="10" refX="0" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,5 L0,10 Z" fill="#0d47a1"/>
    </marker>
    <marker id="arrow-light" markerWidth="8" markerHeight="10" refX="0" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,5 L0,10 Z" fill="#1565c0"/>
    </marker>
    <marker id="arrow-sky" markerWidth="8" markerHeight="10" refX="0" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,5 L0,10 Z" fill="#42a5f5"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="10" refX="0" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,5 L0,10 Z" fill="#ef5350"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="560" fill="#fafafa"/>

  <!-- 标题 -->
  <text x="400" y="42" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="bold" fill="#0d47a1">Vim 的三种模式及切换按键</text>

  <!-- Insert 模式（上） -->
  <g transform="translate(400, 120)">
    <rect x="-90" y="-35" width="180" height="70" rx="10" fill="#1565c0"/>
    <text x="0" y="5" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="bold" fill="#ffffff">Insert（插入模式）</text>
    <text x="0" y="26" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#e3f2fd">输入与修改文本</text>
  </g>

  <!-- Normal 模式（中，默认状态，所有切换围绕它展开） -->
  <g transform="translate(400, 235)">
    <rect x="-120" y="-40" width="240" height="80" rx="10" fill="#0d47a1"/>
    <text x="0" y="6" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" font-weight="bold" fill="#ffffff">Normal（普通模式）</text>
    <text x="0" y="28" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#e3f2fd">浏览、移动、执行命令的默认状态</text>
  </g>

  <!-- Command-line 模式（下） -->
  <g transform="translate(400, 350)">
    <rect x="-120" y="-35" width="240" height="70" rx="10" fill="#42a5f5"/>
    <text x="0" y="5" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="bold" fill="#ffffff">Command-line（命令模式）</text>
    <text x="0" y="26" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#ffffff">在底部输入 : 命令</text>
  </g>

  <!-- 退出 Vim（最下） -->
  <g transform="translate(400, 450)">
    <rect x="-60" y="-25" width="120" height="50" rx="8" fill="#ef5350"/>
    <text x="0" y="6" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="bold" fill="#ffffff">退出 Vim</text>
  </g>

  <!-- Insert → Normal：Esc（左侧下行车道 x=360，从 Insert 底边到 Normal 顶边） -->
  <line x1="360" y1="155" x2="360" y2="187" stroke="#1565c0" stroke-width="3" marker-end="url(#arrow-light)"/>
  <text x="348" y="179" text-anchor="end" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Courier New', monospace" font-size="14" font-weight="bold" fill="#1565c0">Esc</text>

  <!-- Normal → Insert：i / a / o（右侧上行车道 x=440，从 Normal 顶边到 Insert 底边） -->
  <line x1="440" y1="195" x2="440" y2="163" stroke="#0d47a1" stroke-width="3" marker-end="url(#arrow-blue)"/>
  <text x="452" y="179" text-anchor="start" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Courier New', monospace" font-size="14" font-weight="bold" fill="#0d47a1">i / a / o</text>

  <!-- Command-line → Normal：Esc / Enter（左侧上行车道 x=360，从 Command-line 顶边到 Normal 底边） -->
  <line x1="360" y1="315" x2="360" y2="283" stroke="#42a5f5" stroke-width="3" marker-end="url(#arrow-sky)"/>
  <text x="348" y="299" text-anchor="end" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Courier New', monospace" font-size="14" font-weight="bold" fill="#42a5f5">Esc / Enter</text>

  <!-- Normal → Command-line：:（右侧下行车道 x=440，从 Normal 底边到 Command-line 顶边） -->
  <line x1="440" y1="275" x2="440" y2="307" stroke="#0d47a1" stroke-width="3" marker-end="url(#arrow-blue)"/>
  <text x="452" y="299" text-anchor="start" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Courier New', monospace" font-size="14" font-weight="bold" fill="#0d47a1">:</text>

  <!-- Command-line → 退出：:q / :wq（中线 x=400，从 Command-line 底边到退出顶边） -->
  <line x1="400" y1="385" x2="400" y2="417" stroke="#ef5350" stroke-width="3" marker-end="url(#arrow-red)"/>
  <text x="412" y="409" text-anchor="start" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Courier New', monospace" font-size="14" font-weight="bold" fill="#ef5350">:q / :wq</text>

  <!-- 底部说明 -->
  <text x="400" y="518" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#666666">普通模式是默认状态，几乎所有操作都围绕它展开</text>
</svg>

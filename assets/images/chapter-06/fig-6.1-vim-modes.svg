<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="800" style="max-width:100%;height:auto;" preserveAspectRatio="xMidYMid meet">
  <title>Vim 的三种模式及切换按键</title>
  <desc>展示 Vim 的 Normal（普通模式）、Insert（插入模式）、Command-line（命令模式）三种状态，以及 i、a、o、Esc、:、:q、:wq 等切换与退出按键。</desc>

  <defs>
    <marker id="arrow-blue" markerWidth="8" markerHeight="10" refX="0" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,5 L0,10 Z" fill="#0d47a1"/>
    </marker>
    <marker id="arrow-light" markerWidth="8" markerHeight="10" refX="0" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,5 L0,10 Z" fill="#1565c0"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="10" refX="0" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,5 L0,10 Z" fill="#ef5350"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="520" fill="#fafafa"/>

  <!-- 标题 -->
  <text x="400" y="42" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="bold" fill="#0d47a1">Vim 的三种模式及切换按键</text>

  <!-- Normal 模式 -->
  <g transform="translate(400, 150)">
    <rect x="-110" y="-40" width="220" height="80" rx="10" fill="#0d47a1"/>
    <text x="0" y="6" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" font-weight="bold" fill="#ffffff">Normal（普通模式）</text>
    <text x="0" y="28" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#e3f2fd">浏览、移动、执行命令的默认状态</text>
  </g>

  <!-- Insert 模式 -->
  <g transform="translate(230, 360)">
    <rect x="-90" y="-35" width="180" height="70" rx="10" fill="#1565c0"/>
    <text x="0" y="5" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="bold" fill="#ffffff">Insert（插入模式）</text>
    <text x="0" y="26" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#e3f2fd">输入与修改文本</text>
  </g>

  <!-- Command-line 模式 -->
  <g transform="translate(570, 360)">
    <rect x="-90" y="-35" width="180" height="70" rx="10" fill="#42a5f5"/>
    <text x="0" y="5" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="bold" fill="#ffffff">Command-line（命令模式）</text>
    <text x="0" y="26" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#ffffff">在底部输入 : 命令</text>
  </g>

  <!-- 退出 Vim -->
  <g transform="translate(400, 470)">
    <rect x="-60" y="-25" width="120" height="50" rx="8" fill="#ef5350"/>
    <text x="0" y="6" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="bold" fill="#ffffff">退出 Vim</text>
  </g>

  <!-- Normal → Insert：i / a / o -->
  <path d="M340,190 C340,300 230,300 230,300 L230,317" fill="none" stroke="#0d47a1" stroke-width="3" marker-end="url(#arrow-blue)"/>
  <text x="255" y="270" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Courier New', monospace" font-size="14" font-weight="bold" fill="#0d47a1">i / a / o</text>

  <!-- Insert → Normal：Esc -->
  <path d="M140,360 C140,250 360,250 360,210 L360,198" fill="none" stroke="#1565c0" stroke-width="3" marker-end="url(#arrow-light)"/>
  <text x="205" y="270" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Courier New', monospace" font-size="14" font-weight="bold" fill="#1565c0">Esc</text>

  <!-- Normal → Command-line：: -->
  <path d="M460,190 C460,300 570,300 570,300 L570,317" fill="none" stroke="#0d47a1" stroke-width="3" marker-end="url(#arrow-blue)"/>
  <text x="545" y="270" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Courier New', monospace" font-size="14" font-weight="bold" fill="#0d47a1">:</text>

  <!-- Command-line → Normal：Esc / Enter -->
  <path d="M660,360 C660,250 440,250 440,210 L440,198" fill="none" stroke="#42a5f5" stroke-width="3" marker-end="url(#arrow-light)"/>
  <text x="595" y="270" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Courier New', monospace" font-size="14" font-weight="bold" fill="#42a5f5">Esc / Enter</text>

  <!-- Command-line → 退出：:q / :wq -->
  <path d="M570,395 C570,430 400,430 400,430 L400,437" fill="none" stroke="#ef5350" stroke-width="3" marker-end="url(#arrow-red)"/>
  <text x="545" y="425" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Courier New', monospace" font-size="14" font-weight="bold" fill="#ef5350">:q / :wq</text>

  <!-- 底部说明 -->
  <text x="400" y="510" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#666666">普通模式是默认状态，几乎所有操作都围绕它展开</text>
</svg>

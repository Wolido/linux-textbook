<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" width="800" style="max-width:100%;height:auto;" preserveAspectRatio="xMidYMid meet">
  <title>MCP 客户端-服务器-工具关系</title>
  <desc>展示 MCP Host 通过 MCP Protocol 连接多个 MCP Server，从而调用文件系统、数据库、搜索、计算等工具。</desc>

  <defs>
    <marker id="arrow-8.4" markerWidth="8" markerHeight="10" refX="0" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,5 L0,10 Z" fill="#0d47a1"/>
    </marker>
  </defs>

  <rect width="800" height="560" fill="#fafafa"/>

  <text x="400" y="42" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" font-weight="bold" fill="#0d47a1">MCP 客户端-服务器-工具关系</text>

  <!-- MCP Host -->
  <g transform="translate(400,280)">
    <rect x="-90" y="-40" width="180" height="80" rx="12" fill="#0d47a1"/>
    <text x="0" y="-4" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="17" font-weight="bold" fill="#ffffff">MCP Host</text>
    <text x="0" y="22" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" fill="#e3f2fd">Claude Desktop / IDE</text>
  </g>

  <!-- 左侧 Server：文件系统 -->
  <g transform="translate(120,280)">
    <rect x="-75" y="-35" width="150" height="70" rx="10" fill="#1565c0"/>
    <text x="0" y="-6" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="bold" fill="#ffffff">MCP Server</text>
    <text x="0" y="20" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="#ffffff">文件系统</text>
  </g>

  <!-- 右侧 Server：数据库 -->
  <g transform="translate(680,280)">
    <rect x="-75" y="-35" width="150" height="70" rx="10" fill="#1565c0"/>
    <text x="0" y="-6" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="bold" fill="#ffffff">MCP Server</text>
    <text x="0" y="20" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="#ffffff">数据库</text>
  </g>

  <!-- 上方 Server：搜索 -->
  <g transform="translate(400,130)">
    <rect x="-75" y="-35" width="150" height="70" rx="10" fill="#1565c0"/>
    <text x="0" y="-6" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="bold" fill="#ffffff">MCP Server</text>
    <text x="0" y="20" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="#ffffff">搜索</text>
  </g>

  <!-- 下方 Server：计算工具 -->
  <g transform="translate(400,430)">
    <rect x="-75" y="-35" width="150" height="70" rx="10" fill="#1565c0"/>
    <text x="0" y="-6" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="bold" fill="#ffffff">MCP Server</text>
    <text x="0" y="20" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="#ffffff">计算工具</text>
  </g>

  <!-- 箭头 -->
  <line x1="310" y1="280" x2="203" y2="280" stroke="#0d47a1" stroke-width="2" marker-end="url(#arrow-8.4)"/>
  <line x1="490" y1="280" x2="597" y2="280" stroke="#0d47a1" stroke-width="2" marker-end="url(#arrow-8.4)"/>
  <line x1="400" y1="240" x2="400" y2="173" stroke="#0d47a1" stroke-width="2" marker-end="url(#arrow-8.4)"/>
  <line x1="400" y1="320" x2="400" y2="387" stroke="#0d47a1" stroke-width="2" marker-end="url(#arrow-8.4)"/>

  <text x="252.5" y="265" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="bold" fill="#0d47a1">MCP Protocol</text>

  <text x="400" y="525" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="#666666">Host 与 Server 之间通过 MCP Protocol 通信，调用文件系统、数据库等工具</text>
</svg>

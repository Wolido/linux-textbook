<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" width="800" style="max-width:100%;height:auto;" preserveAspectRatio="xMidYMid meet">
  <title>正向代理与反向代理</title>
  <desc>对比正向代理（代理客户端访问外网）与反向代理（代理内部服务器响应客户端）的工作方式。</desc>

  <defs>
    <marker id="arrow-8.2" markerWidth="8" markerHeight="10" refX="0" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,5 L0,10 Z" fill="#0d47a1"/>
    </marker>
  </defs>

  <rect width="800" height="380" fill="#fafafa"/>

  <text x="400" y="42" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" font-weight="bold" fill="#0d47a1">正向代理与反向代理</text>

  <!-- 分隔线 -->
  <line x1="400" y1="90" x2="400" y2="345" stroke="#e0e0e0" stroke-width="2"/>

  <!-- 正向代理 -->
  <text x="215" y="80" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="16" font-weight="bold" fill="#0d47a1">正向代理</text>

  <g transform="translate(90,240)">
    <rect x="-45" y="-35" width="90" height="70" rx="8" fill="#42a5f5"/>
    <text x="0" y="6" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="bold" fill="#ffffff">客户端</text>
  </g>

  <g transform="translate(215,240)">
    <rect x="-45" y="-35" width="90" height="70" rx="8" fill="#0d47a1"/>
    <text x="0" y="6" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="bold" fill="#ffffff">代理</text>
  </g>

  <g transform="translate(340,240)">
    <rect x="-45" y="-35" width="90" height="70" rx="8" fill="#1565c0"/>
    <text x="0" y="-2" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="bold" fill="#ffffff">外网</text>
    <text x="0" y="18" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="bold" fill="#ffffff">服务器</text>
  </g>

  <line x1="135" y1="240" x2="162" y2="240" stroke="#0d47a1" stroke-width="2" marker-end="url(#arrow-8.2)"/>
  <line x1="260" y1="240" x2="287" y2="240" stroke="#0d47a1" stroke-width="2" marker-end="url(#arrow-8.2)"/>

  <text x="215" y="320" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="#666666">代理代替客户端访问外部网络</text>

  <!-- 反向代理 -->
  <text x="585" y="80" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="16" font-weight="bold" fill="#0d47a1">反向代理</text>

  <g transform="translate(455,240)">
    <rect x="-40" y="-35" width="80" height="70" rx="8" fill="#42a5f5"/>
    <text x="0" y="6" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="bold" fill="#ffffff">客户端</text>
  </g>

  <g transform="translate(585,240)">
    <rect x="-40" y="-35" width="80" height="70" rx="8" fill="#0d47a1"/>
    <text x="0" y="6" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="bold" fill="#ffffff">代理</text>
  </g>

  <g transform="translate(715,240)">
    <rect x="-40" y="-35" width="80" height="70" rx="8" fill="#ef5350"/>
    <text x="0" y="-2" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="bold" fill="#ffffff">内部</text>
    <text x="0" y="18" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="bold" fill="#ffffff">服务器</text>
  </g>

  <line x1="495" y1="240" x2="537" y2="240" stroke="#0d47a1" stroke-width="2" marker-end="url(#arrow-8.2)"/>
  <line x1="625" y1="240" x2="667" y2="240" stroke="#0d47a1" stroke-width="2" marker-end="url(#arrow-8.2)"/>

  <text x="585" y="320" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="#666666">代理把请求分发给内部服务器集群</text>
</svg>

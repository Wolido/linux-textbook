<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" width="800" style="max-width:100%;height:auto;" preserveAspectRatio="xMidYMid meet">
  <title>HTTP 请求与响应结构</title>
  <desc>左右对比 HTTP 请求和响应的组成部分：请求行/状态行、请求头/响应头、请求体/响应体。</desc>

  <rect width="800" height="560" fill="#fafafa"/>

  <text x="400" y="42" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" font-weight="bold" fill="#0d47a1">HTTP 请求与响应结构</text>

  <!-- HTTP 请求卡片 -->
  <g transform="translate(70,100)">
    <rect width="330" height="400" rx="12" fill="#ffffff" stroke="#1565c0" stroke-width="2"/>
    <rect width="330" height="44" rx="12" fill="#1565c0"/>
    <rect x="0" y="32" width="330" height="20" fill="#1565c0"/>
    <text x="165" y="28" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="16" font-weight="bold" fill="#ffffff">HTTP 请求</text>

    <!-- 请求行 -->
    <rect x="0" y="44" width="330" height="60" fill="#e3f2fd"/>
    <text x="16" y="68" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#0d47a1">请求行</text>
    <text x="16" y="90" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Courier New',monospace" font-size="14" font-weight="bold" fill="#0d47a1">GET /index.html HTTP/1.1</text>

    <!-- 请求头 -->
    <rect x="0" y="104" width="330" height="140" fill="#bbdefb"/>
    <text x="16" y="128" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#0d47a1">请求头</text>
    <text x="16" y="154" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Courier New',monospace" font-size="13" fill="#0d47a1">Host: example.com</text>
    <text x="16" y="178" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Courier New',monospace" font-size="13" fill="#0d47a1">User-Agent: curl/8.4</text>
    <text x="16" y="202" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Courier New',monospace" font-size="13" fill="#0d47a1">Accept: text/html</text>
    <text x="16" y="226" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Courier New',monospace" font-size="13" fill="#0d47a1">Content-Length: 0</text>

    <!-- 请求体 -->
    <rect x="0" y="244" width="330" height="156" fill="#90caf9"/>
    <text x="16" y="268" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#0d47a1">请求体</text>
    <text x="16" y="296" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Courier New',monospace" font-size="14" fill="#0d47a1">{ "key": "value" }</text>
  </g>

  <!-- HTTP 响应卡片 -->
  <g transform="translate(420,100)">
    <rect width="330" height="400" rx="12" fill="#ffffff" stroke="#0d47a1" stroke-width="2"/>
    <rect width="330" height="44" rx="12" fill="#0d47a1"/>
    <rect x="0" y="32" width="330" height="20" fill="#0d47a1"/>
    <text x="165" y="28" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="16" font-weight="bold" fill="#ffffff">HTTP 响应</text>

    <!-- 状态行 -->
    <rect x="0" y="44" width="330" height="60" fill="#e3f2fd"/>
    <text x="16" y="68" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#0d47a1">状态行</text>
    <text x="16" y="90" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Courier New',monospace" font-size="14" font-weight="bold" fill="#0d47a1">HTTP/1.1 200 OK</text>

    <!-- 响应头 -->
    <rect x="0" y="104" width="330" height="140" fill="#bbdefb"/>
    <text x="16" y="128" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#0d47a1">响应头</text>
    <text x="16" y="154" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Courier New',monospace" font-size="13" fill="#0d47a1">Content-Type: text/html</text>
    <text x="16" y="178" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Courier New',monospace" font-size="13" fill="#0d47a1">Content-Length: 1234</text>
    <text x="16" y="202" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Courier New',monospace" font-size="13" fill="#0d47a1">Server: nginx/1.24</text>
    <text x="16" y="226" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Courier New',monospace" font-size="13" fill="#0d47a1">Date: Mon, 12 Jul 2026</text>

    <!-- 响应体 -->
    <rect x="0" y="244" width="330" height="156" fill="#90caf9"/>
    <text x="16" y="268" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#0d47a1">响应体</text>
    <text x="16" y="296" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Courier New',monospace" font-size="14" fill="#0d47a1">&lt;html&gt;Hello&lt;/html&gt;</text>
  </g>

  <text x="400" y="535" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" fill="#666666">请求由客户端发往服务器；响应由服务器返回给客户端</text>
</svg>

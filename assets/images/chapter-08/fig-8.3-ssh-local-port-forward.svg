<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="800" style="max-width:100%;height:auto;" preserveAspectRatio="xMidYMid meet">
  <title>SSH 本地端口转发</title>
  <desc>展示本地机器通过 SSH 隧道把本地端口转发到远程服务器上的服务。</desc>

  <defs>
    <marker id="arrow-8.3" markerWidth="8" markerHeight="10" refX="0" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,5 L0,10 Z" fill="#0d47a1"/>
    </marker>
  </defs>

  <rect width="800" height="480" fill="#fafafa"/>

  <text x="400" y="42" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" font-weight="bold" fill="#0d47a1">SSH 本地端口转发</text>

  <!-- 本地机器 -->
  <g transform="translate(175,235)">
    <rect x="-85" y="-55" width="170" height="110" rx="10" fill="#1565c0"/>
    <text x="0" y="-12" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="16" font-weight="bold" fill="#ffffff">本地机器</text>
    <text x="0" y="14" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" fill="#e3f2fd">浏览器 / 应用</text>
    <text x="0" y="36" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Courier New',monospace" font-size="13" fill="#ffffff">localhost:8888</text>
  </g>

  <!-- SSH 服务器 -->
  <g transform="translate(465,235)">
    <rect x="-85" y="-55" width="170" height="110" rx="10" fill="#0d47a1"/>
    <text x="0" y="-12" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="16" font-weight="bold" fill="#ffffff">SSH 服务器</text>
    <text x="0" y="14" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" fill="#e3f2fd">远程主机</text>
    <text x="0" y="36" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Courier New',monospace" font-size="13" fill="#ffffff">user@server</text>
  </g>

  <!-- Jupyter 服务 -->
  <g transform="translate(695,235)">
    <rect x="-75" y="-45" width="150" height="90" rx="10" fill="#42a5f5"/>
    <text x="0" y="-6" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="16" font-weight="bold" fill="#ffffff">Jupyter</text>
    <text x="0" y="22" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Courier New',monospace" font-size="13" fill="#ffffff">localhost:8888</text>
  </g>

  <!-- SSH 隧道 -->
  <line x1="260" y1="235" x2="372" y2="235" stroke="#0d47a1" stroke-width="2" stroke-dasharray="14,2" marker-end="url(#arrow-8.3)"/>
  <text x="320" y="205" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" fill="#0d47a1">SSH 隧道（加密）</text>

  <!-- 远程转发 -->
  <line x1="550" y1="235" x2="612" y2="235" stroke="#0d47a1" stroke-width="2" marker-end="url(#arrow-8.3)"/>
  <text x="585" y="205" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" fill="#0d47a1">转发到远程服务</text>

  <!-- 命令框 -->
  <g transform="translate(400,380)">
    <rect x="-220" y="-35" width="440" height="70" rx="8" fill="#1e1e1e"/>
    <text x="-200" y="8" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Courier New',monospace" font-size="14" fill="#4caf50">$</text>
    <text x="-180" y="8" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Courier New',monospace" font-size="14" fill="#ffffff">ssh -L 8888:localhost:8888 user@server</text>
  </g>

  <text x="400" y="460" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" fill="#666666">本地 8888 端口的流量经 SSH 加密后转发到远程服务器的 8888 端口</text>
</svg>

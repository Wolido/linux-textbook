<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" width="800" style="max-width:100%;height:auto;">
  <title>SSH 加密通道</title>
  <desc>展示 SSH 在本地电脑与远程服务器之间建立加密通道。</desc>

  <rect width="800" height="340" fill="#fafafa"/>

  <!-- 左侧：本地电脑 -->
  <g transform="translate(80, 60)">
    <rect x="0" y="0" width="140" height="90" rx="8" fill="#1565c0"/>
    <rect x="10" y="10" width="120" height="70" rx="4" fill="#ffffff"/>
    <rect x="40" y="80" width="60" height="10" rx="2" fill="#0d47a1"/>
    <text x="70" y="120" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#2c3e50">本地电脑</text>
  </g>

  <!-- 右侧：远程服务器 -->
  <g transform="translate(580, 40)">
    <rect x="0" y="0" width="140" height="130" rx="8" fill="#2c3e50"/>
    <rect x="20" y="20" width="100" height="18" rx="2" fill="#ecf0f1"/>
    <circle cx="34" cy="29" r="4" fill="#27ae60"/>
    <circle cx="50" cy="29" r="4" fill="#ffbd2e"/>
    <circle cx="66" cy="29" r="4" fill="#e74c3c"/>
    <rect x="20" y="48" width="100" height="18" rx="2" fill="#ecf0f1"/>
    <rect x="20" y="76" width="100" height="18" rx="2" fill="#ecf0f1"/>
    <text x="70" y="160" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#2c3e50">远程服务器</text>
  </g>

  <!-- 中间：SSH 加密通道 -->
  <g transform="translate(260, 70)">
    <rect x="0" y="0" width="280" height="100" rx="50" fill="#e8f5e9" stroke="#27ae60" stroke-width="2"/>
    <text x="140" y="34" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="500" fill="#2e7d32">SSH 加密通道</text>
    <text x="140" y="60" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#2e7d32">数据加密传输，防止窃听</text>

    <!-- 锁图标 -->
    <g transform="translate(140, 82)">
      <rect x="-10" y="-6" width="20" height="16" rx="3" fill="#27ae60"/>
      <path d="M-6,-10 C-6,-16 6,-16 6,-10 L6,-6 L-6,-6 Z" fill="none" stroke="#27ae60" stroke-width="3"/>
      <circle cx="0" cy="2" r="2.5" fill="#ffffff"/>
    </g>
  </g>

  <!-- 底部说明 -->
  <text x="400" y="300" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#2c3e50">SSH 把命令、密码、输出全部加密后再在网络上传输</text>
</svg>
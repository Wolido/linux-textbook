<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 660" width="800" style="max-width:100%;height:auto;">
  <title>长命令 vs 简短别名</title>
  <desc>展示通过 ~/.ssh/config 配置文件，把一长串 ssh 命令简化为 ssh gpu 别名。</desc>

  <rect width="800" height="660" fill="#fafafa"/>

  <!-- 左侧：长命令 -->
  <g transform="translate(80, 80)">
    <rect x="0" y="0" width="640" height="64" rx="8" fill="#ffebee" stroke="#e74c3c" stroke-width="2"/>
    <text x="20" y="38" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#2c3e50">ssh -p 2222 -i ~/.ssh/id_ed25519 student@gpu-lab01</text>
  </g>

  <!-- 向下箭头：长命令 → config（尖端顶住 config 框顶边 y=200） -->
  <line x1="400" y1="144" x2="400" y2="194" stroke="#1565c0" stroke-width="2"/>
  <path d="M399,194 L401,194 L404,194 L400,200 L396,194 Z" fill="#1565c0"/>

  <!-- 中间：config 文件 -->
  <g transform="translate(240, 200)">
    <rect x="0" y="0" width="320" height="130" rx="10" fill="#ffffff" stroke="#1565c0" stroke-width="2"/>
    <path d="M10,0 L310,0 A10,10 0 0 1 320,10 L320,36 L0,36 L0,10 A10,10 0 0 1 10,0 Z" fill="#e3f2fd"/>
    <circle cx="18" cy="18" r="5" fill="#ff5f56"/>
    <circle cx="36" cy="18" r="5" fill="#ffbd2e"/>
    <circle cx="54" cy="18" r="5" fill="#27c93f"/>
    <text x="160" y="22" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#2c3e50">~/.ssh/config</text>

    <text x="20" y="66" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#1565c0">Host gpu</text>
    <text x="20" y="92" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#2c3e50">  HostName gpu-lab01.example.com</text>
    <text x="20" y="114" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#2c3e50">  User student</text>
  </g>

  <!-- 右侧：短命令 -->
  <g transform="translate(280, 360)">
    <rect x="0" y="0" width="240" height="64" rx="8" fill="#e8f5e9" stroke="#27ae60" stroke-width="2"/>
    <text x="20" y="38" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" fill="#2c3e50">ssh gpu</text>
  </g>

  <!-- 箭头：config → 短命令（尖端顶住短命令框顶边 y=360） -->
  <line x1="400" y1="330" x2="400" y2="354" stroke="#27ae60" stroke-width="2"/>
  <path d="M399,354 L401,354 L404,354 L400,360 L396,354 Z" fill="#27ae60"/>

  <!-- 底部：完整 config 片段 -->
  <g transform="translate(80, 460)">
    <rect x="0" y="0" width="640" height="175" rx="10" fill="#2d2d2d"/>
    <text x="20" y="30" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#4caf50"># ~/.ssh/config</text>
    <text x="20" y="54" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#ffffff">Host gpu</text>
    <text x="20" y="78" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#ffffff">  HostName gpu-lab01.example.com</text>
    <text x="20" y="102" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#ffffff">  User student</text>
    <text x="20" y="126" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#ffffff">  Port 2222</text>
    <text x="20" y="150" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#ffffff">  IdentityFile ~/.ssh/id_ed25519</text>
  </g>
</svg>

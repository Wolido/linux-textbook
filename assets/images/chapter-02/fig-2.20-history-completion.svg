<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" style="max-width:100%;height:auto;">
  <title>历史与 Tab 补全示意</title>
  <desc>左侧展示按上箭头召回历史命令，右侧展示 Tab 补全路径。</desc>

  <!-- 背景 -->
  <rect width="800" height="420" fill="#fafafa"/>

  <!-- 标题 -->
  <text x="400" y="42" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="500" fill="#2c3e50">历史与 Tab 补全示意</text>

  <!-- 左侧终端：历史命令 -->
  <g transform="translate(60, 90)">
    <text x="150" y="-14" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="500" fill="#2c3e50">历史命令</text>

    <rect width="300" height="250" rx="10" fill="#2d2d2d"/>
    <rect width="300" height="40" rx="10" fill="#3a3a3a"/>
    <rect x="0" y="40" width="300" height="210" fill="#2d2d2d"/>
    <circle cx="16" cy="20" r="6" fill="#ff5f56"/>
    <circle cx="34" cy="20" r="6" fill="#ffbd2e"/>
    <circle cx="52" cy="20" r="6" fill="#27c93f"/>

    <text x="150" y="25" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#cccccc">History</text>

    <text x="14" y="65" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#9e9e9e">1  ls -l</text>
    <text x="14" y="95" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#9e9e9e">2  cd ai-materials</text>
    <text x="14" y="125" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#9e9e9e">3  python train.py ...</text>
    <text x="14" y="155" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#9e9e9e">4  ls logs/</text>

    <text x="14" y="200" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#4caf50">student@debian:~$</text>
    <text x="152" y="200" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#ffffff">ls logs/</text>

    <!-- 上箭头 -->
    <g transform="translate(240, 200)">
      <circle r="22" fill="#1565c0"/>
      <path d="M0,-10 L-8,2 L-3,2 L-3,10 L3,10 L3,2 L8,2 Z" fill="#ffffff"/>
    </g>
    <text x="240" y="242" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#1565c0">按 ↑ 召回</text>
  </g>

  <!-- 右侧终端：Tab 补全 -->
  <g transform="translate(440, 90)">
    <text x="150" y="-14" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="500" fill="#2c3e50">Tab 补全</text>

    <rect width="300" height="250" rx="10" fill="#2d2d2d"/>
    <rect width="300" height="40" rx="10" fill="#3a3a3a"/>
    <rect x="0" y="40" width="300" height="210" fill="#2d2d2d"/>
    <circle cx="16" cy="20" r="6" fill="#ff5f56"/>
    <circle cx="34" cy="20" r="6" fill="#ffbd2e"/>
    <circle cx="52" cy="20" r="6" fill="#27c93f"/>

    <text x="150" y="25" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#cccccc">Completion</text>

    <text x="14" y="70" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#4caf50">student@debian:~$</text>
    <text x="152" y="70" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#ffffff">cd /usr/loc</text>

    <!-- Tab 键 -->
    <rect x="190" y="85" width="56" height="24" rx="4" fill="#7f8c8d"/>
    <text x="218" y="102" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#ffffff">Tab</text>

    <text x="14" y="140" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#4caf50">student@debian:~$</text>
    <text x="152" y="140" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#ffffff">cd /usr/local/</text>
  </g>

  <!-- 底部提示 -->
  <g transform="translate(400, 370)">
    <rect x="-280" y="-16" width="560" height="38" rx="8" fill="#ecf0f1"/>
    <text x="0" y="8" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#2c3e50">减少拼写错误，提高输入效率</text>
  </g>
</svg>

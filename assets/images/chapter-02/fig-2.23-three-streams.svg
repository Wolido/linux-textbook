<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" width="800" style="max-width:100%;height:auto;">
  <title>标准输入、输出与错误</title>
  <desc>展示 stdin、stdout、stderr 三条数据流，以及它们如何通过编号 0、1、2 被重定向。</desc>

  <!-- 背景 -->
  <rect width="800" height="380" fill="#fafafa"/>

  <!-- 标题 -->
  <text x="400" y="42" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="500" fill="#2c3e50">图2.23 标准输入、输出与错误</text>

  <!-- 输入文件 input.txt -->
  <g transform="translate(160, 180)">
    <rect x="-55" y="-22" width="110" height="44" rx="6" fill="#ffffff" stroke="#1565c0" stroke-width="2"/>
    <text x="0" y="7" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#1565c0">input.txt</text>
  </g>
  <text x="160" y="135" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="600" fill="#1565c0">stdin 0</text>

  <!-- 命令方块 python train.py -->
  <g transform="translate(400, 180)">
    <rect x="-80" y="-35" width="160" height="70" rx="8" fill="#0d47a1"/>
    <text x="0" y="6" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" font-weight="600" fill="#ffffff">python train.py</text>
  </g>

  <!-- 输出文件 out.log -->
  <g transform="translate(640, 130)">
    <rect x="-55" y="-22" width="110" height="44" rx="6" fill="#ffffff" stroke="#27ae60" stroke-width="2"/>
    <text x="0" y="7" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#27ae60">out.log</text>
  </g>
  <text x="640" y="85" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="600" fill="#27ae60">stdout 1</text>

  <!-- 错误文件 err.log -->
  <g transform="translate(640, 230)">
    <rect x="-55" y="-22" width="110" height="44" rx="6" fill="#ffffff" stroke="#e74c3c" stroke-width="2"/>
    <text x="0" y="7" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#e74c3c">err.log</text>
  </g>
  <text x="640" y="185" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="600" fill="#e74c3c">stderr 2</text>

  <!-- stdin 箭头：input.txt → 命令（蓝色） -->
  <path d="M215,178.5 L215,181.5 L312,181.5 L312,186 L320,180 L312,174 L312,178.5 Z" fill="#1565c0"/>

  <!-- stdout 箭头：命令 → out.log（绿色） -->
  <polyline points="480,160 540,160 540,130" fill="none" stroke="#27ae60" stroke-width="3" stroke-linejoin="round"/>
  <path d="M540,128.5 L540,131.5 L577,131.5 L577,136 L585,130 L577,124 L577,128.5 Z" fill="#27ae60"/>

  <!-- stderr 箭头：命令 → err.log（红色） -->
  <polyline points="480,200 540,200 540,230" fill="none" stroke="#e74c3c" stroke-width="3" stroke-linejoin="round"/>
  <path d="M540,228.5 L540,231.5 L577,231.5 L577,236 L585,230 L577,224 L577,228.5 Z" fill="#e74c3c"/>

  <!-- 底部示例命令 -->
  <g transform="translate(400, 330)">
    <rect x="-320" y="-24" width="640" height="52" rx="8" fill="#ecf0f1"/>
    <text x="0" y="8" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#2c3e50">python train.py &gt; out.log 2&gt; err.log &lt; input.txt</text>
  </g>
</svg>

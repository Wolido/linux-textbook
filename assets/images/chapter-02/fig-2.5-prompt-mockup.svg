<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" width="800" style="max-width:100%;height:auto;" preserveAspectRatio="xMidYMid meet">
  <title>终端提示符拆解示意图</title>
  <desc>一张模拟 macOS 风格终端窗口的 SVG 示意图，拆解 bash 提示符 student@debian:~/project$ 的各部分含义。</desc>

  <!-- 页面背景 -->
  <rect width="800" height="540" fill="#fafafa"/>

  <!-- 终端窗口外框 -->
  <rect x="40" y="40" width="720" height="440" rx="12" fill="#2d2d2d"/>

  <!-- 标题栏：上圆角、下平直 -->
  <path d="M52,40 L748,40 A12,12 0 0 1 760,52 L760,80 L40,80 L40,52 A12,12 0 0 1 52,40 Z" fill="#3a3a3a"/>

  <!-- 终端主体：下圆角 -->
  <path d="M40,80 L760,80 L760,468 A12,12 0 0 1 748,480 L52,480 A12,12 0 0 1 40,468 Z" fill="#1e1e1e"/>

  <!-- 标题栏按钮 -->
  <circle cx="68" cy="60" r="6" fill="#ff5f56"/>
  <circle cx="92" cy="60" r="6" fill="#ffbd2e"/>
  <circle cx="116" cy="60" r="6" fill="#27c93f"/>

  <!-- 标题 -->
  <text x="400" y="65" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#e0e0e0">Terminal — bash</text>

  <!-- 提示符与命令 -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Courier New', monospace" font-size="20">
    <text x="64" y="130" fill="#4caf50" textLength="84" lengthAdjust="spacingAndGlyphs">student</text>
    <text x="148" y="130" fill="#4caf50" textLength="12" lengthAdjust="spacingAndGlyphs">@</text>
    <text x="160" y="130" fill="#4caf50" textLength="72" lengthAdjust="spacingAndGlyphs">debian</text>
    <text x="232" y="130" fill="#4caf50" textLength="12" lengthAdjust="spacingAndGlyphs">:</text>
    <text x="244" y="130" fill="#4caf50" textLength="108" lengthAdjust="spacingAndGlyphs">~/project</text>
    <text x="352" y="130" fill="#4caf50" textLength="12" lengthAdjust="spacingAndGlyphs">$</text>
    <text x="364" y="130" fill="#4caf50" textLength="12" lengthAdjust="spacingAndGlyphs"> </text>
    <text x="376" y="130" fill="#ffffff" textLength="60" lengthAdjust="spacingAndGlyphs">ls -F</text>
  </g>

  <!-- 光标 -->
  <rect x="440" y="108" width="12" height="22" rx="1" fill="#ffffff"/>

  <!-- 标注引线：主信息行 -->
  <g stroke="#42a5f5" stroke-width="2" fill="none">
    <line x1="106" y1="146" x2="106" y2="268"/>
    <line x1="196" y1="146" x2="196" y2="268"/>
    <line x1="298" y1="146" x2="298" y2="268"/>
  </g>

  <!-- 标注引线：分隔符/提示符行 -->
  <g stroke="#42a5f5" stroke-width="2" fill="none">
    <line x1="154" y1="146" x2="154" y2="356"/>
    <line x1="238" y1="146" x2="238" y2="356"/>
    <line x1="358" y1="146" x2="358" y2="356"/>
  </g>

  <!-- 向下箭头：主信息行（指向标签框顶部，保留 4px 间隙） -->
  <g fill="#42a5f5">
    <path d="M105,268 L107,268 L107,274 L110,274 L106,280 L102,274 L105,274 Z"/>
    <path d="M195,268 L197,268 L197,274 L200,274 L196,280 L192,274 L195,274 Z"/>
    <path d="M297,268 L299,268 L299,274 L302,274 L298,280 L294,274 L297,274 Z"/>
  </g>

  <!-- 向下箭头：分隔符/提示符行 -->
  <g fill="#42a5f5">
    <path d="M153,356 L155,356 L155,362 L158,362 L154,368 L150,362 L153,362 Z"/>
    <path d="M237,356 L239,356 L239,362 L242,362 L238,368 L234,362 L237,362 Z"/>
    <path d="M357,356 L359,356 L359,362 L362,362 L358,368 L354,362 L357,362 Z"/>
  </g>

  <!-- 主信息标签框 -->
  <g font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">
    <rect x="66" y="280" width="80" height="40" rx="6" fill="#1565c0"/>
    <text x="106" y="305">当前用户名</text>

    <rect x="160" y="280" width="72" height="40" rx="6" fill="#1565c0"/>
    <text x="196" y="305">主机名</text>

    <rect x="250" y="280" width="96" height="40" rx="6" fill="#1565c0"/>
    <text x="298" y="305">当前目录</text>
  </g>

  <!-- 分隔符/提示符标签框 -->
  <g font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">
    <rect x="122" y="368" width="64" height="40" rx="6" fill="#0d47a1"/>
    <text x="154" y="393">分隔符</text>

    <rect x="206" y="368" width="64" height="40" rx="6" fill="#0d47a1"/>
    <text x="238" y="393">分隔符</text>

    <rect x="298" y="368" width="120" height="40" rx="6" fill="#ef5350"/>
    <text x="358" y="393">普通用户提示符</text>
  </g>
</svg>
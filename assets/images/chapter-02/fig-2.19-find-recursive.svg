<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="800" style="max-width:100%;height:auto;">
  <title>find 递归搜索示意</title>
  <desc>展示 find 从 project 目录递归进入子目录，高亮匹配 *.log 的文件。</desc>

  <!-- 背景 -->
  <rect width="800" height="520" fill="#fafafa"/>

  <!-- 标题 -->
  <text x="400" y="42" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="500" fill="#2c3e50">find 递归搜索示意</text>

  <!-- 图例 -->
  <g font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#2c3e50">
    <line x1="40" y1="95" x2="75" y2="95" stroke="#2c3e50" stroke-width="2"/>
    <text x="85" y="99">目录层级</text>
    <line x1="40" y1="115" x2="68" y2="115" stroke="#1565c0" stroke-width="3" stroke-dasharray="6 4"/>
    <path d="M68,111 L76,115 L68,119 Z" fill="#1565c0"/>
    <text x="85" y="119">搜索命中路径</text>
  </g>

  <!-- 目录树层级连接线（无箭头） -->
  <g stroke="#2c3e50" stroke-width="2" fill="none">
    <!-- project 到子目录 -->
    <line x1="400" y1="116" x2="400" y2="150"/>
    <line x1="160" y1="150" x2="640" y2="150"/>
    <line x1="160" y1="150" x2="160" y2="184"/>
    <line x1="400" y1="150" x2="400" y2="184"/>
    <line x1="640" y1="150" x2="640" y2="184"/>

    <!-- data 到 train.csv -->
    <line x1="160" y1="230" x2="160" y2="270"/>
    <!-- logs 到 log 文件 -->
    <line x1="400" y1="230" x2="320" y2="270"/>
    <line x1="400" y1="230" x2="480" y2="270"/>
    <!-- src 到 train.py -->
    <line x1="640" y1="230" x2="640" y2="270"/>
  </g>

  <!-- find 搜索命中路径：从 project 到两个 .log 文件 -->
  <g fill="none" stroke="#1565c0" stroke-width="3" stroke-dasharray="8 5">
    <path d="M340,116 C260,180,280,220,320,259"/>
    <path d="M460,116 C540,180,520,220,480,259"/>
  </g>
  <g fill="#1565c0">
    <!-- train.log 箭头 -->
    <path d="M318.5,259 L321.5,259 L326,259 L320,267 L314,259 Z"/>
    <!-- debug.log 箭头 -->
    <path d="M478.5,259 L481.5,259 L486,259 L480,267 L474,259 Z"/>
  </g>

  <!-- project -->
  <g>
    <rect x="340" y="70" width="120" height="46" rx="6" fill="#1565c0"/>
    <text x="400" y="100" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" font-weight="600" fill="#ffffff">project/</text>
  </g>

  <!-- 子目录 -->
  <g>
    <rect x="100" y="184" width="120" height="46" rx="6" fill="#27ae60"/>
    <text x="160" y="214" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" fill="#ffffff">data/</text>

    <rect x="340" y="184" width="120" height="46" rx="6" fill="#27ae60"/>
    <text x="400" y="214" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" fill="#ffffff">logs/</text>

    <rect x="580" y="184" width="120" height="46" rx="6" fill="#27ae60"/>
    <text x="640" y="214" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" fill="#ffffff">src/</text>
  </g>

  <!-- 文件 -->
  <g>
    <!-- data/train.csv -->
    <rect x="100" y="270" width="120" height="40" rx="6" fill="#90caf9" stroke="#1565c0" stroke-width="2"/>
    <text x="160" y="296" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#0d47a1">train.csv</text>

    <!-- logs/train.log（匹配） -->
    <rect x="260" y="270" width="120" height="40" rx="6" fill="#f39c12" stroke="#e67e22" stroke-width="2"/>
    <text x="320" y="296" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="600" fill="#ffffff">train.log</text>

    <!-- logs/debug.log（匹配） -->
    <rect x="420" y="270" width="120" height="40" rx="6" fill="#f39c12" stroke="#e67e22" stroke-width="2"/>
    <text x="480" y="296" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="600" fill="#ffffff">debug.log</text>

    <!-- src/train.py -->
    <rect x="580" y="270" width="120" height="40" rx="6" fill="#a5d6a7" stroke="#27ae60" stroke-width="2"/>
    <text x="640" y="296" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#1b5e20">train.py</text>
  </g>

  <!-- 右侧命令框 -->
  <g transform="translate(610, 60)">
    <rect width="150" height="65" rx="8" fill="#ecf0f1"/>
    <text x="75" y="26" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#2c3e50">find . -name</text>
    <text x="75" y="50" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#2c3e50">"*.log"</text>
  </g>

  <!-- 底部说明 -->
  <g transform="translate(400, 420)">
    <rect x="-320" y="-30" width="640" height="60" rx="8" fill="#ecf0f1"/>
    <text x="0" y="-4" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#2c3e50">find 会递归进入所有子目录</text>
    <text x="0" y="22" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#2c3e50">而 ls *.log 只在当前目录匹配</text>
  </g>
</svg>

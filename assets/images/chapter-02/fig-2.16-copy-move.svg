<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" style="max-width:100%;height:auto;">
  <title>复制与移动示意</title>
  <desc>对比 cp 和 mv：cp 保留源文件并在目标位置生成副本；mv 把源文件搬到目标位置。</desc>

  <!-- 背景 -->
  <rect width="800" height="400" fill="#fafafa"/>

  <!-- 标题 -->
  <text x="400" y="42" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="500" fill="#2c3e50">复制与移动示意</text>

  <!-- 左侧面板：复制 cp -->
  <g>
    <text x="200" y="78" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="500" fill="#1565c0">复制 cp</text>

    <!-- 源文件 -->
    <g transform="translate(100, 140)">
      <rect x="-48" y="-25" width="96" height="50" rx="6" fill="#1565c0"/>
      <text x="0" y="6" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#ffffff">report.txt</text>
    </g>

    <!-- 目标目录 -->
    <g transform="translate(300, 140)">
      <rect x="-56" y="-25" width="112" height="50" rx="6" fill="#ffffff" stroke="#1565c0" stroke-width="2"/>
      <text x="0" y="6" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#1565c0">backup/</text>
    </g>

    <!-- 复制箭头（尖端顶住 backup/ 框左边缘 x=244） -->
    <line x1="148" y1="140" x2="236" y2="140" stroke="#1565c0" stroke-width="3"/>
    <path d="M148,138.5 L148,141.5 L236,141.5 L236,146 L244,140 L236,134 L236,138.5 Z" fill="#1565c0"/>

    <!-- 副本 -->
    <g transform="translate(300, 230)">
      <rect x="-48" y="-20" width="96" height="40" rx="6" fill="#90caf9" stroke="#1565c0" stroke-width="2"/>
      <text x="0" y="7" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#0d47a1">report.txt</text>
    </g>
    <text x="300" y="200" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#666">目标位置出现副本</text>

    <text x="200" y="300" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#2c3e50">cp report.txt backup/</text>
    <text x="200" y="320" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#666">源文件保留</text>
  </g>

  <!-- 分隔线 -->
  <line x1="400" y1="80" x2="400" y2="340" stroke="#bdc3c7" stroke-width="2" stroke-dasharray="8 6"/>

  <!-- 右侧面板：移动 mv -->
  <g>
    <text x="600" y="78" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="500" fill="#e67e22">移动 mv</text>

    <!-- 源文件（移动后消失） -->
    <g transform="translate(500, 140)">
      <rect x="-48" y="-25" width="96" height="50" rx="6" fill="#ffffff" stroke="#e67e22" stroke-width="2" stroke-dasharray="6 4"/>
      <text x="0" y="6" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#e67e22">report.txt</text>
    </g>

    <!-- 目标目录 -->
    <g transform="translate(700, 140)">
      <rect x="-56" y="-25" width="112" height="50" rx="6" fill="#ffffff" stroke="#e67e22" stroke-width="2"/>
      <text x="0" y="6" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#e67e22">backup/</text>
    </g>

    <!-- 移动箭头（尖端顶住 backup/ 框左边缘 x=644） -->
    <line x1="548" y1="140" x2="636" y2="140" stroke="#e67e22" stroke-width="3"/>
    <path d="M548,138.5 L548,141.5 L636,141.5 L636,146 L644,140 L636,134 L636,138.5 Z" fill="#e67e22"/>

    <!-- 已移动的文件 -->
    <g transform="translate(700, 230)">
      <rect x="-48" y="-20" width="96" height="40" rx="6" fill="#fdebd0" stroke="#e67e22" stroke-width="2"/>
      <text x="0" y="7" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#d35400">report.txt</text>
    </g>
    <text x="700" y="200" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#666">目标位置出现文件</text>

    <text x="600" y="300" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#2c3e50">mv report.txt backup/</text>
    <text x="600" y="320" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#666">源文件被移走</text>
  </g>

  <!-- 底部提示 -->
  <g transform="translate(400, 370)">
    <rect x="-280" y="-16" width="560" height="36" rx="8" fill="#ecf0f1"/>
    <text x="0" y="7" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#2c3e50">提示：覆盖前先用 ls 检查目标文件是否存在</text>
  </g>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" style="max-width:100%;height:auto;">
  <title>创建与删除命令示意</title>
  <desc>用三张卡片分别展示 touch 创建空文件、mkdir 创建目录和 rm 删除文件，并提示删除前确认。</desc>

  <!-- 背景 -->
  <rect width="800" height="420" fill="#fafafa"/>

  <!-- 标题 -->
  <text x="400" y="42" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="500" fill="#2c3e50">创建与删除命令示意</text>

  <!-- touch 卡片 -->
  <g>
    <rect x="40" y="70" width="208" height="240" rx="12" fill="#ffffff" stroke="#1565c0" stroke-width="2"/>
    <rect x="40" y="70" width="208" height="44" rx="12" fill="#1565c0"/>
    <text x="144" y="100" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="600" fill="#ffffff">touch notes.txt</text>

    <!-- 文件图标 -->
    <g transform="translate(144, 170)">
      <rect x="-28" y="-36" width="56" height="72" rx="4" fill="#90caf9" stroke="#1565c0" stroke-width="2"/>
      <path d="M-4,-36 L4,-36 L4,-24 L-4,-24 Z" fill="#1565c0"/>
      <text x="0" y="12" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#0d47a1">notes</text>
      <text x="0" y="28" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#0d47a1">.txt</text>
    </g>

    <text x="144" y="262" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="500" fill="#2c3e50">创建空文件</text>
    <text x="144" y="286" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#666">从无到有</text>
  </g>

  <!-- mkdir 卡片 -->
  <g>
    <rect x="296" y="70" width="208" height="240" rx="12" fill="#ffffff" stroke="#27ae60" stroke-width="2"/>
    <rect x="296" y="70" width="208" height="44" rx="12" fill="#27ae60"/>
    <text x="400" y="100" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" font-weight="600" fill="#ffffff">mkdir data</text>

    <!-- 文件夹图标 -->
    <g transform="translate(400, 175)">
      <path d="M-34,-22 L-10,-22 L-2,-12 L30,-12 L30,22 L-34,22 Z" fill="#a5d6a7" stroke="#27ae60" stroke-width="2"/>
      <path d="M-34,-10 L30,-10 L30,22 L-34,22 Z" fill="#81c784" stroke="#27ae60" stroke-width="2"/>
      <text x="0" y="10" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="600" fill="#1b5e20">data</text>
    </g>

    <text x="400" y="262" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="500" fill="#2c3e50">创建目录</text>
    <text x="400" y="286" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#666">建立新文件夹</text>
  </g>

  <!-- rm 卡片 -->
  <g>
    <rect x="552" y="70" width="208" height="240" rx="12" fill="#ffffff" stroke="#e74c3c" stroke-width="2"/>
    <rect x="552" y="70" width="208" height="44" rx="12" fill="#e74c3c"/>
    <text x="656" y="100" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" font-weight="600" fill="#ffffff">rm notes.txt</text>

    <!-- 垃圾桶图标 -->
    <g transform="translate(656, 175)" fill="none" stroke="#c0392b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
      <rect x="-24" y="-12" width="48" height="46" rx="4" fill="#f1948a" stroke="none"/>
      <line x1="-30" y1="-12" x2="30" y2="-12"/>
      <line x1="-10" y1="-20" x2="10" y2="-20"/>
      <line x1="-14" y1="-20" x2="-14" y2="-12"/>
      <line x1="14" y1="-20" x2="14" y2="-12"/>
      <line x1="-10" y1="4" x2="-10" y2="22"/>
      <line x1="0" y1="4" x2="0" y2="22"/>
      <line x1="10" y1="4" x2="10" y2="22"/>
    </g>

    <text x="656" y="262" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="500" fill="#2c3e50">删除文件</text>
    <text x="656" y="286" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#e74c3c">不可逆，谨慎使用</text>
  </g>

  <!-- 底部提示 -->
  <g transform="translate(400, 360)">
    <rect x="-280" y="-20" width="560" height="46" rx="8" fill="#ecf0f1"/>
    <text x="0" y="10" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#2c3e50">提示：删除前先用 <tspan font-family="ui-monospace, monospace" font-weight="600">ls</tspan> 确认目标</text>
  </g>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" width="800" style="max-width:100%;height:auto;">
  <title>管道连接示意</title>
  <desc>展示 cat train.log | grep "Loss" | wc -l 这条流水线，数据从左向右依次经过三个命令模块。</desc>

  <!-- 背景 -->
  <rect width="800" height="320" fill="#fafafa"/>

  <!-- 标题 -->
  <text x="400" y="42" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="500" fill="#2c3e50">管道：把命令串成流水线</text>

  <!-- 模块 A：cat train.log -->
  <g transform="translate(40, 110)">
    <rect x="0" y="0" width="160" height="80" rx="10" fill="#1565c0"/>
    <text x="80" y="36" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" font-weight="600" fill="#ffffff">cat train.log</text>
    <text x="80" y="62" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#bbdefb">输出原始日志</text>
  </g>

  <!-- 箭头 1：cat → grep -->
  <path d="M200,148.5 L200,151.5 L308,151.5 L308,156 L316,150 L308,144 L308,148.5 Z" fill="#0d47a1"/>

  <!-- 模块 B：grep "Loss" -->
  <g transform="translate(320, 110)">
    <rect x="0" y="0" width="160" height="80" rx="10" fill="#27ae60"/>
    <text x="80" y="36" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" font-weight="600" fill="#ffffff">grep "Loss"</text>
    <text x="80" y="62" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#d5f5e3">过滤出 Loss 行</text>
  </g>

  <!-- 箭头 2：grep → wc -->
  <path d="M480,148.5 L480,151.5 L588,151.5 L588,156 L596,150 L588,144 L588,148.5 Z" fill="#0d47a1"/>

  <!-- 模块 C：wc -l -->
  <g transform="translate(600, 110)">
    <rect x="0" y="0" width="160" height="80" rx="10" fill="#e67e22"/>
    <text x="80" y="36" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" font-weight="600" fill="#ffffff">wc -l</text>
    <text x="80" y="62" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#fdebd0">统计行数</text>
  </g>

  <!-- 底部说明 -->
  <g transform="translate(400, 250)">
    <rect x="-300" y="-20" width="600" height="50" rx="8" fill="#ecf0f1"/>
    <text x="0" y="12" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#2c3e50">cat train.log | grep "Loss" | wc -l</text>
  </g>
</svg>
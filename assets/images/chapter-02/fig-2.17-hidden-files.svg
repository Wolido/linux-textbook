<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" style="max-width:100%;height:auto;">
  <title>隐藏文件与命名规则示意</title>
  <desc>展示 ls 默认不显示以点开头的文件，ls -a 才能显示，并说明 Linux 不依赖扩展名判断文件类型。</desc>

  <!-- 背景 -->
  <rect width="800" height="420" fill="#fafafa"/>

  <!-- 标题 -->
  <text x="400" y="42" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="500" fill="#2c3e50">隐藏文件与命名规则示意</text>

  <!-- 左侧终端：ls -->
  <g transform="translate(40, 70)">
    <rect width="340" height="280" rx="10" fill="#2d2d2d"/>
    <path d="M10,0 L330,0 A10,10 0 0 1 340,10 L340,40 L0,40 L0,10 A10,10 0 0 1 10,0 Z" fill="#3a3a3a"/>
    <circle cx="18" cy="20" r="6" fill="#ff5f56"/>
    <circle cx="36" cy="20" r="6" fill="#ffbd2e"/>
    <circle cx="54" cy="20" r="6" fill="#27c93f"/>
    <text x="170" y="25" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#cccccc">Terminal</text>

    <text x="20" y="66" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#4caf50">student@debian:~$ <tspan fill="#ffffff">ls</tspan></text>

    <g transform="translate(100, 121)">
      <rect x="-60" y="-16" width="120" height="32" rx="6" fill="#ffffff" stroke="#27ae60" stroke-width="2"/>
      <text x="0" y="5" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#2c3e50">README.md</text>
    </g>
    <g transform="translate(100, 176)">
      <rect x="-56" y="-16" width="112" height="32" rx="6" fill="#ffffff" stroke="#1565c0" stroke-width="2"/>
      <text x="0" y="5" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#2c3e50">train.py</text>
    </g>

    <text x="170" y="245" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#95a5a6">默认只显示普通文件</text>
  </g>

  <!-- 右侧终端：ls -a -->
  <g transform="translate(420, 70)">
    <rect width="340" height="280" rx="10" fill="#2d2d2d"/>
    <path d="M10,0 L330,0 A10,10 0 0 1 340,10 L340,40 L0,40 L0,10 A10,10 0 0 1 10,0 Z" fill="#3a3a3a"/>
    <circle cx="18" cy="20" r="6" fill="#ff5f56"/>
    <circle cx="36" cy="20" r="6" fill="#ffbd2e"/>
    <circle cx="54" cy="20" r="6" fill="#27c93f"/>
    <text x="170" y="25" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#cccccc">Terminal</text>

    <text x="20" y="66" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#4caf50">student@debian:~$ <tspan fill="#ffffff">ls -a</tspan></text>

    <g transform="translate(80, 111)">
      <rect x="-50" y="-16" width="100" height="32" rx="6" fill="#ecf0f1" stroke="#95a5a6" stroke-width="2" stroke-dasharray="4 2"/>
      <text x="0" y="5" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#7f8c8d">.bashrc</text>
    </g>
    <text x="150" y="116" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#7f8c8d">← 以 . 开头</text>

    <g transform="translate(80, 156)">
      <rect x="-46" y="-16" width="92" height="32" rx="6" fill="#ecf0f1" stroke="#95a5a6" stroke-width="2" stroke-dasharray="4 2"/>
      <text x="0" y="5" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#7f8c8d">.ssh/</text>
    </g>
    <text x="150" y="161" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#7f8c8d">← 隐藏目录</text>

    <g transform="translate(80, 211)">
      <rect x="-60" y="-16" width="120" height="32" rx="6" fill="#ffffff" stroke="#27ae60" stroke-width="2"/>
      <text x="0" y="5" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#2c3e50">README.md</text>
    </g>
    <g transform="translate(80, 256)">
      <rect x="-56" y="-16" width="112" height="32" rx="6" fill="#ffffff" stroke="#1565c0" stroke-width="2"/>
      <text x="0" y="5" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#2c3e50">train.py</text>
    </g>
  </g>

  <!-- 底部说明 -->
  <g transform="translate(400, 380)">
    <rect x="-260" y="-18" width="520" height="36" rx="8" fill="#ecf0f1"/>
    <text x="0" y="6" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#2c3e50">Linux 不依赖扩展名判断文件类型</text>
  </g>
</svg>

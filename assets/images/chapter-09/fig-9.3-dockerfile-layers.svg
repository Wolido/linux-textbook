<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" width="800" style="max-width:100%;height:auto;" preserveAspectRatio="xMidYMid meet">
  <title>Dockerfile 分层构建</title>
  <desc>展示 Dockerfile 的每条指令对应生成一层镜像，最终自下而上叠加成完整镜像；未改动的层可复用构建缓存。</desc>

  <defs>
    <marker id="arrow-9.3" markerWidth="8" markerHeight="10" refX="0" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,5 L0,10 Z" fill="#0d47a1"/>
    </marker>
  </defs>

  <rect width="800" height="560" fill="#fafafa"/>

  <text x="400" y="42" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" font-weight="bold" fill="#0d47a1">Dockerfile 分层构建</text>

  <!-- Dockerfile 代码框 -->
  <g transform="translate(60,140)">
    <rect width="300" height="320" rx="10" fill="#ffffff" stroke="#0d47a1" stroke-width="2"/>
    <rect width="300" height="40" rx="10" fill="#0d47a1"/>
    <rect x="0" y="30" width="300" height="10" fill="#0d47a1"/>
    <text x="150" y="26" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Dockerfile</text>

    <text x="20" y="85" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Courier New',monospace" font-size="13" fill="#0d47a1">FROM ubuntu:22.04</text>
    <text x="20" y="145" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Courier New',monospace" font-size="13" fill="#0d47a1">RUN apt-get install -y python3</text>
    <text x="20" y="205" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Courier New',monospace" font-size="13" fill="#0d47a1">COPY app.py /app/</text>
    <text x="20" y="265" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Courier New',monospace" font-size="13" fill="#0d47a1">CMD ["python3", "/app/app.py"]</text>
  </g>

  <!-- 镜像层堆叠 -->
  <g transform="translate(480,140)">
    <!-- Layer 0: FROM -->
    <rect y="240" width="240" height="56" rx="6" fill="#0d47a1"/>
    <text x="120" y="274" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="bold" fill="#ffffff">Layer 0：FROM ubuntu:22.04</text>

    <!-- Layer 1: RUN -->
    <rect y="180" width="240" height="56" rx="6" fill="#1565c0"/>
    <text x="120" y="214" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="bold" fill="#ffffff">Layer 1：RUN install python3</text>

    <!-- Layer 2: COPY -->
    <rect y="120" width="240" height="56" rx="6" fill="#42a5f5"/>
    <text x="120" y="154" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="bold" fill="#0d47a1">Layer 2：COPY app.py</text>

    <!-- Layer 3: CMD -->
    <rect y="60" width="240" height="56" rx="6" fill="#90caf9"/>
    <text x="120" y="94" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="bold" fill="#0d47a1">Layer 3：CMD 启动应用</text>

    <!-- 堆叠方向标注 -->
    <text x="120" y="330" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" fill="#0d47a1">自下而上叠加</text>
    <line x1="120" y1="312" x2="120" y2="40" stroke="#0d47a1" stroke-width="1" stroke-dasharray="4,4"/>
    <polygon points="120,32 116,42 124,42" fill="#0d47a1"/>
  </g>

  <!-- 连接箭头：指令 → 对应层 -->
  <!-- FROM → Layer 0 -->
  <path d="M360,225 L380,225 L380,408 L472,408" fill="none" stroke="#0d47a1" stroke-width="2" marker-end="url(#arrow-9.3)"/>

  <!-- RUN → Layer 1 -->
  <path d="M360,285 L400,285 L400,348 L472,348" fill="none" stroke="#0d47a1" stroke-width="2" marker-end="url(#arrow-9.3)"/>

  <!-- COPY → Layer 2 -->
  <path d="M360,345 L420,345 L420,288 L472,288" fill="none" stroke="#0d47a1" stroke-width="2" marker-end="url(#arrow-9.3)"/>

  <!-- CMD → Layer 3 -->
  <path d="M360,405 L440,405 L440,228 L472,228" fill="none" stroke="#0d47a1" stroke-width="2" marker-end="url(#arrow-9.3)"/>

  <!-- 底部说明 -->
  <text x="400" y="525" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" fill="#666666">Dockerfile 每行指令生成一个只读层；未改动的层可直接复用缓存，修改某层后其上所有层需重新构建</text>
</svg>

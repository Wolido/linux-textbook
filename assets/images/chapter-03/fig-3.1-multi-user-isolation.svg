<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" style="max-width:100%;height:auto;">
  <title>图3.1 多用户家目录隔离</title>
  <desc>同一台物理服务器上，多个用户拥有各自独立的家目录，文件彼此隔离；系统通过 /etc/passwd 记录用户信息。</desc>

  <!-- 背景 -->
  <rect width="800" height="400" fill="#fafafa"/>

  <!-- 服务器外框 -->
  <rect x="60" y="60" width="680" height="290" rx="12" fill="#ffffff" stroke="#0d47a1" stroke-width="2"/>

  <!-- 服务器标签 -->
  <text x="400" y="95" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="600" fill="#0d47a1">服务器 / 物理主机</text>

  <!-- 文件图标定义 -->
  <defs>
    <g id="file-icon">
      <rect x="0" y="0" width="14" height="18" rx="2" fill="#ffffff" stroke="#1565c0" stroke-width="1.5"/>
      <path d="M9,0 L9,5 L14,5" fill="none" stroke="#1565c0" stroke-width="1.5"/>
    </g>
  </defs>

  <!-- 家目录 1：Alice -->
  <g>
    <rect x="95" y="125" width="170" height="150" rx="8" fill="#e3f2fd" stroke="#42a5f5" stroke-width="2"/>
    <path d="M95,133 A8,8 0 0,1 103,125 H257 A8,8 0 0,1 265,133 V163 H95 Z" fill="#42a5f5"/>
    <text x="180" y="153" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="600" fill="#ffffff">/home/alice</text>

    <use href="#file-icon" x="115" y="178"/>
    <text x="140" y="190" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#2c3e50">模型权重</text>

    <use href="#file-icon" x="115" y="208"/>
    <text x="140" y="220" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#2c3e50">论文草稿</text>
  </g>

  <!-- 家目录 2：Bob -->
  <g>
    <rect x="315" y="125" width="170" height="150" rx="8" fill="#e3f2fd" stroke="#42a5f5" stroke-width="2"/>
    <path d="M315,133 A8,8 0 0,1 323,125 H477 A8,8 0 0,1 485,133 V163 H315 Z" fill="#42a5f5"/>
    <text x="400" y="153" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="600" fill="#ffffff">/home/bob</text>

    <use href="#file-icon" x="335" y="178"/>
    <text x="360" y="190" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#2c3e50">XRD 数据</text>

    <use href="#file-icon" x="335" y="208"/>
    <text x="360" y="220" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#2c3e50">脚本</text>
  </g>

  <!-- 家目录 3：Carol -->
  <g>
    <rect x="535" y="125" width="170" height="150" rx="8" fill="#e3f2fd" stroke="#42a5f5" stroke-width="2"/>
    <path d="M535,133 A8,8 0 0,1 543,125 H697 A8,8 0 0,1 705,133 V163 H535 Z" fill="#42a5f5"/>
    <text x="620" y="153" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="600" fill="#ffffff">/home/carol</text>

    <use href="#file-icon" x="555" y="178"/>
    <text x="580" y="190" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#2c3e50">实验记录</text>

    <use href="#file-icon" x="555" y="208"/>
    <text x="580" y="220" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#2c3e50">数据表</text>
  </g>

  <!-- 隔离分隔线 -->
  <line x1="290" y1="138" x2="290" y2="262" stroke="#90caf9" stroke-width="2" stroke-dasharray="6 4"/>
  <line x1="510" y1="138" x2="510" y2="262" stroke="#90caf9" stroke-width="2" stroke-dasharray="6 4"/>

  <!-- /etc/passwd 标签 -->
  <rect x="305" y="295" width="190" height="40" rx="6" fill="#f5f5f5" stroke="#9e9e9e" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="400" y="320" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#555555">系统用户名单 /etc/passwd</text>
</svg>
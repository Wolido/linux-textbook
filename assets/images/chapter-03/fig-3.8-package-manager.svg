<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" style="max-width:100%;height:auto;">
  <title>图3.8 包管理器从仓库拉取软件</title>
  <desc>包管理器（如 apt、dnf）从软件仓库获取软件包，并自动解析和安装依赖，简化系统软件管理。</desc>

  <!-- 背景 -->
  <rect width="800" height="400" fill="#fafafa"/>

  <!-- 标题 -->
  <text x="400" y="45" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="600" fill="#0d47a1">包管理器工作方式</text>

  <!-- 软件仓库 -->
  <g transform="translate(180, 200)">
    <rect x="-100" y="-70" width="200" height="140" rx="10" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
    <text x="0" y="-35" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="600" fill="#0d47a1">软件仓库</text>
    <text x="0" y="-5" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#2c3e50">镜像源</text>
    <text x="0" y="20" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#2c3e50">package.deb/.rpm</text>

    <!-- 仓库图标：叠起来的盒子 -->
    <rect x="55" y="-60" width="30" height="20" rx="2" fill="none" stroke="#1565c0" stroke-width="1.5"/>
    <rect x="60" y="-65" width="30" height="20" rx="2" fill="none" stroke="#1565c0" stroke-width="1.5"/>
  </g>

  <!-- 包管理器 -->
  <g transform="translate(400, 200)">
    <rect x="-90" y="-60" width="180" height="120" rx="10" fill="#fff3e0" stroke="#e67e22" stroke-width="2"/>
    <text x="0" y="-25" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="600" fill="#e65100">包管理器</text>
    <text x="0" y="0" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#2c3e50">apt / dnf</text>
    <text x="0" y="28" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#2c3e50">自动解决依赖</text>
  </g>

  <!-- 系统 -->
  <g transform="translate(620, 200)">
    <rect x="-100" y="-70" width="200" height="140" rx="10" fill="#e8f5e9" stroke="#27ae60" stroke-width="2"/>
    <text x="0" y="-35" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="600" fill="#1b5e20">本地系统</text>
    <text x="0" y="-10" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#2c3e50">/usr/bin</text>
    <text x="0" y="15" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#2c3e50">/usr/lib</text>
    <text x="0" y="40" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#2c3e50">安装到系统路径</text>
  </g>

  <!-- 箭头：仓库 → 包管理器 -->
  <line x1="280" y1="200" x2="304" y2="200" stroke="#0d47a1" stroke-width="2"/>
  <path d="M280,199 L280,201 L304,201 L304,204 L310,200 L304,196 L304,199 Z" fill="#0d47a1"/>
  <text x="340" y="185" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#2c3e50">拉取软件包</text>

  <!-- 箭头：包管理器 → 系统 -->
  <line x1="490" y1="200" x2="514" y2="200" stroke="#0d47a1" stroke-width="2"/>
  <path d="M490,199 L490,201 L514,201 L514,204 L520,200 L514,196 L514,199 Z" fill="#0d47a1"/>
  <text x="555" y="185" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#2c3e50">安装与配置</text>

  <!-- 依赖说明 -->
  <g transform="translate(400, 330)">
    <rect x="-260" y="-22" width="520" height="44" rx="6" fill="#f5f5f5" stroke="#9e9e9e" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="0" y="6" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#666666">包管理器会自动下载主包及其依赖，避免手动寻找和安装库文件</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" width="800" style="max-width:100%;height:auto;">
  <title>图3.7 脚本权限检查与修改流程</title>
  <desc>脚本默认没有执行权限，需要先通过 ls -l 检查权限，再使用 chmod +x 添加执行权限，最后用 ./script.sh 运行。</desc>

  <!-- 背景 -->
  <rect width="800" height="440" fill="#fafafa"/>

  <!-- 标题 -->
  <text x="400" y="45" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="600" fill="#0d47a1">脚本执行前的权限检查与修改</text>

  <!-- 步骤 1：检查权限 -->
  <g transform="translate(400, 110)">
    <rect x="-140" y="-30" width="280" height="60" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
    <text x="0" y="-5" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" font-weight="600" fill="#0d47a1">ls -l script.sh</text>
    <text x="0" y="18" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#2c3e50">检查当前权限</text>
  </g>

  <!-- 步骤 2：发现无执行权 -->
  <g transform="translate(400, 210)">
    <rect x="-150" y="-30" width="300" height="60" rx="8" fill="#ffebee" stroke="#e74c3c" stroke-width="2"/>
    <text x="0" y="-5" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" font-weight="600" fill="#c0392b">-rw-r--r--</text>
    <text x="0" y="18" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#2c3e50">发现无执行权限（x 缺失）</text>
  </g>

  <!-- 步骤 3：添加执行权 -->
  <g transform="translate(400, 310)">
    <rect x="-140" y="-30" width="280" height="60" rx="8" fill="#fff3e0" stroke="#e67e22" stroke-width="2"/>
    <text x="0" y="-5" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" font-weight="600" fill="#e65100">chmod +x script.sh</text>
    <text x="0" y="18" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#2c3e50">为所有用户添加执行权限</text>
  </g>

  <!-- 步骤 4：执行脚本 -->
  <g transform="translate(400, 400)">
    <rect x="-120" y="-25" width="240" height="50" rx="8" fill="#e8f5e9" stroke="#27ae60" stroke-width="2"/>
    <text x="0" y="-2" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" font-weight="600" fill="#1b5e20">./script.sh</text>
    <text x="0" y="18" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#2c3e50">成功执行脚本</text>
  </g>

  <!-- 向下箭头 1 -->
  <line x1="400" y1="140" x2="400" y2="172" stroke="#0d47a1" stroke-width="3"/>
  <path d="M398.5,140 L401.5,140 L401.5,172 L406,172 L400,180 L394,172 L398.5,172 Z" fill="#0d47a1"/>

  <!-- 向下箭头 2 -->
  <line x1="400" y1="240" x2="400" y2="272" stroke="#0d47a1" stroke-width="3"/>
  <path d="M398.5,240 L401.5,240 L401.5,272 L406,272 L400,280 L394,272 L398.5,272 Z" fill="#0d47a1"/>

  <!-- 向下箭头 3 -->
  <line x1="400" y1="340" x2="400" y2="367" stroke="#0d47a1" stroke-width="3"/>
  <path d="M398.5,340 L401.5,340 L401.5,367 L406,367 L400,375 L394,367 L398.5,367 Z" fill="#0d47a1"/>
</svg>

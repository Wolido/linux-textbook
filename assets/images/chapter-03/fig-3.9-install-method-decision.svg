<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 530" width="800" style="max-width:100%;height:auto;">
  <title>图3.9 软件安装方式选择</title>
  <desc>选择软件安装方式时，优先使用系统包管理器；不满足时再考虑 Conda 或官方二进制；最后才选择源码编译。</desc>

  <!-- 背景 -->
  <rect width="800" height="530" fill="#fafafa"/>

  <!-- 箭头标记 -->
  <defs>
    <marker id="arr-blue" markerWidth="6" markerHeight="8" refX="0" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L0,8 L6,4 Z" fill="#0d47a1"/>
    </marker>
    <marker id="arr-red" markerWidth="6" markerHeight="8" refX="0" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L0,8 L6,4 Z" fill="#ef5350"/>
    </marker>
  </defs>

  <!-- 标题 -->
  <text x="400" y="45" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="600" fill="#0d47a1">软件安装方式选择</text>

  <!-- 开始 -->
  <g transform="translate(400, 110)">
    <rect x="-80" y="-25" width="160" height="50" rx="25" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
    <text x="0" y="6" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="600" fill="#0d47a1">需要安装软件</text>
  </g>

  <!-- 决策 1：包管理器 -->
  <g transform="translate(400, 205)">
    <polygon points="0,-35 120,0 0,35 -120,0" fill="#fff3e0" stroke="#e67e22" stroke-width="2"/>
    <text x="0" y="-5" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="600" fill="#e65100">包管理器中</text>
    <text x="0" y="12" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="600" fill="#e65100">是否有该软件？</text>
  </g>

  <!-- 安装 1：包管理器 -->
  <g transform="translate(160, 295)">
    <rect x="-85" y="-35" width="170" height="70" rx="8" fill="#e8f5e9" stroke="#27ae60" stroke-width="2"/>
    <text x="0" y="-8" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="600" fill="#1b5e20">apt/dnf install</text>
    <text x="0" y="18" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#2c3e50">系统包管理器安装</text>
  </g>

  <!-- 决策 2：Conda/官方二进制 -->
  <g transform="translate(400, 350)">
    <polygon points="0,-35 140,0 0,35 -140,0" fill="#fff3e0" stroke="#e67e22" stroke-width="2"/>
    <text x="0" y="-5" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="600" fill="#e65100">Conda / 官方二进制</text>
    <text x="0" y="12" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="600" fill="#e65100">是否满足需求？</text>
  </g>

  <!-- 安装 2：Conda/官方二进制 -->
  <g transform="translate(160, 450)">
    <rect x="-85" y="-35" width="170" height="70" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
    <text x="0" y="-8" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="600" fill="#0d47a1">conda install</text>
    <text x="0" y="18" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#2c3e50">或下载官方二进制</text>
  </g>

  <!-- 安装 3：源码编译 -->
  <g transform="translate(640, 450)">
    <rect x="-85" y="-35" width="170" height="70" rx="8" fill="#ffebee" stroke="#e74c3c" stroke-width="2"/>
    <text x="0" y="-8" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="600" fill="#c0392b">./configure</text>
    <text x="0" y="18" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#2c3e50">源码编译安装</text>
  </g>

  <!-- 箭头：开始 → 决策 1 -->
  <line x1="400" y1="135" x2="400" y2="164" stroke="#0d47a1" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- 箭头：决策 1 → 是 → 包管理器安装 -->
  <path d="M280,205 L160,205 L160,254" fill="none" stroke="#0d47a1" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="220" y="189" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#0d47a1" font-weight="600">是</text>

  <!-- 箭头：决策 1 → 否 → 决策 2 -->
  <path d="M520,205 L575,205 L575,280 L400,280 L400,309" fill="none" stroke="#ef5350" stroke-width="2" marker-end="url(#arr-red)"/>
  <text x="548" y="189" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#ef5350" font-weight="600">否</text>

  <!-- 箭头：决策 2 → 是 → Conda 安装 -->
  <path d="M260,350 L160,350 L160,409" fill="none" stroke="#0d47a1" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="210" y="374" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#0d47a1" font-weight="600">是</text>

  <!-- 箭头：决策 2 → 否 → 源码编译 -->
  <path d="M540,350 L640,350 L640,409" fill="none" stroke="#ef5350" stroke-width="2" marker-end="url(#arr-red)"/>
  <text x="590" y="374" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#ef5350" font-weight="600">否</text>
</svg>
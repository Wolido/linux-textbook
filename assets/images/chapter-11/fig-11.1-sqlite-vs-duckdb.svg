<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="800" style="max-width:100%;height:auto;" preserveAspectRatio="xMidYMid meet">
  <title>SQLite 与 DuckDB 定位对比</title>
  <desc>左右对比 SQLite 与 DuckDB 的数据库定位：两者都是进程内、无服务器数据库，但 SQLite 面向 OLTP 事务型场景，DuckDB 面向 OLAP 分析型场景。</desc>

  <defs>
    <marker id="arrow-11.1" markerWidth="10" markerHeight="10" refX="0" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#0d47a1"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="480" fill="#fafafa"/>

  <!-- 标题 -->
  <text x="400" y="42" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" font-weight="bold" fill="#0d47a1">SQLite vs DuckDB 定位对比</text>

  <!-- 左侧 SQLite 卡片 -->
  <g transform="translate(40, 80)">
    <!-- 外框 -->
    <rect width="340" height="250" rx="10" fill="#ffffff" stroke="#1565c0" stroke-width="2"/>

    <!-- 标题栏：仅顶部圆角 -->
    <path d="M10,0 L330,0 A10,10 0 0 1 340,10 L340,70 L0,70 L0,10 A10,10 0 0 1 10,0 Z" fill="#1565c0"/>

    <!-- 数据库名与定位 -->
    <text x="170" y="38" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="24" font-weight="bold" fill="#ffffff">SQLite</text>
    <text x="170" y="60" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" fill="#e3f2fd">嵌入式关系型数据库</text>

    <!-- 高亮行：OLTP -->
    <rect x="15" y="123" width="310" height="34" rx="6" fill="#e3f2fd"/>

    <!-- 要点列表 -->
    <g font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="#0d47a1">
      <circle cx="25" cy="101" r="4" fill="#1565c0"/>
      <text x="42" y="105">进程内、无服务器</text>

      <circle cx="25" cy="136" r="4" fill="#1565c0"/>
      <text x="42" y="140">面向 OLTP（事务型）</text>

      <circle cx="25" cy="171" r="4" fill="#1565c0"/>
      <text x="42" y="175">单文件、轻量</text>

      <circle cx="25" cy="206" r="4" fill="#1565c0"/>
      <text x="42" y="210">适合：App 配置、小型数据、嵌入式</text>
    </g>
  </g>

  <!-- 右侧 DuckDB 卡片 -->
  <g transform="translate(420, 80)">
    <!-- 外框 -->
    <rect width="340" height="250" rx="10" fill="#ffffff" stroke="#0d47a1" stroke-width="2"/>

    <!-- 标题栏：仅顶部圆角 -->
    <path d="M10,0 L330,0 A10,10 0 0 1 340,10 L340,70 L0,70 L0,10 A10,10 0 0 1 10,0 Z" fill="#0d47a1"/>

    <!-- 数据库名与定位 -->
    <text x="170" y="38" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="24" font-weight="bold" fill="#ffffff">DuckDB</text>
    <text x="170" y="60" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" fill="#e3f2fd">分析型关系数据库</text>

    <!-- 高亮行：OLAP -->
    <rect x="15" y="123" width="310" height="34" rx="6" fill="#e3f2fd"/>

    <!-- 要点列表 -->
    <g font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="#0d47a1">
      <circle cx="25" cy="101" r="4" fill="#0d47a1"/>
      <text x="42" y="105">进程内、无服务器</text>

      <circle cx="25" cy="136" r="4" fill="#0d47a1"/>
      <text x="42" y="140">面向 OLAP（分析型）</text>

      <circle cx="25" cy="171" r="4" fill="#0d47a1"/>
      <text x="42" y="175">列式存储、向量化执行</text>

      <circle cx="25" cy="206" r="4" fill="#0d47a1"/>
      <text x="42" y="210">适合：大 CSV/Parquet 分析、<tspan x="42" dy="18">数据科学、快速原型</tspan></text>
    </g>
  </g>

  <!-- VS 标识 -->
  <circle cx="400" cy="205" r="18" fill="#ffffff" stroke="#0d47a1" stroke-width="2"/>
  <text x="400" y="210" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="bold" fill="#0d47a1">VS</text>

  <!-- 底部共同点 -->
  <rect x="40" y="360" width="720" height="70" rx="10" fill="#e3f2fd" stroke="#0d47a1" stroke-width="2"/>
  <text x="400" y="395" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="bold" fill="#0d47a1">相同点：都是进程内数据库，不需要单独服务器进程</text>

  <!-- 从共同点指向两个卡片的箭头 -->
  <line x1="210" y1="360" x2="210" y2="340" stroke="#0d47a1" stroke-width="2" marker-end="url(#arrow-11.1)"/>
  <line x1="590" y1="360" x2="590" y2="340" stroke="#0d47a1" stroke-width="2" marker-end="url(#arrow-11.1)"/>
</svg>

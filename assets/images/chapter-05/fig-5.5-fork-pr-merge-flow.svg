<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" width="800" style="max-width:100%;height:auto;" preserveAspectRatio="xMidYMid meet">
  <title>Fork、Pull Request 与 Merge 协作流程</title>
  <desc>展示开源协作中从原仓库 Fork、本地修改、Push、发起 Pull Request 到原仓库 Merge 的完整流程。</desc>

  <defs>
    <marker id="arrow-blue" markerWidth="8" markerHeight="10" refX="0" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,5 L0,10 Z" fill="#0d47a1"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="360" fill="#fafafa"/>

  <!-- 标题 -->
  <text x="400" y="42" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="bold" fill="#0d47a1">Fork → PR → Merge 协作流程</text>

  <!-- 步骤 1：原仓库 -->
  <g transform="translate(100, 180)">
    <rect x="-50" y="-45" width="100" height="90" rx="8" fill="#e3f2fd" stroke="#0d47a1" stroke-width="2"/>
    <text x="0" y="-8" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="bold" fill="#0d47a1">原仓库</text>
    <text x="0" y="16" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Courier New', monospace" font-size="13" fill="#1565c0">upstream</text>
  </g>

  <!-- 步骤 2：个人 Fork -->
  <g transform="translate(224, 180)">
    <rect x="-50" y="-45" width="100" height="90" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
    <text x="0" y="-8" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="bold" fill="#1565c0">个人 Fork</text>
    <text x="0" y="16" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Courier New', monospace" font-size="13" fill="#1565c0">origin</text>
  </g>

  <!-- 步骤 3：本地修改 -->
  <g transform="translate(348, 180)">
    <rect x="-50" y="-45" width="100" height="90" rx="8" fill="#e3f2fd" stroke="#42a5f5" stroke-width="2"/>
    <text x="0" y="-8" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="bold" fill="#42a5f5">本地修改</text>
    <text x="0" y="16" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Courier New', monospace" font-size="13" fill="#666666">git clone</text>
    <text x="0" y="32" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Courier New', monospace" font-size="13" fill="#666666">+ edit</text>
  </g>

  <!-- 步骤 4：Push -->
  <g transform="translate(472, 180)">
    <rect x="-50" y="-45" width="100" height="90" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
    <text x="0" y="-8" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="bold" fill="#1565c0">Push</text>
    <text x="0" y="16" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Courier New', monospace" font-size="14" fill="#666666">到个人 Fork</text>
  </g>

  <!-- 步骤 5：Pull Request -->
  <g transform="translate(596, 180)">
    <rect x="-50" y="-45" width="100" height="90" rx="8" fill="#ffebee" stroke="#ef5350" stroke-width="2"/>
    <text x="0" y="-8" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="bold" fill="#ef5350">Pull Request</text>
    <text x="0" y="16" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#666666">发起合并请求</text>
  </g>

  <!-- 步骤 6：Merge -->
  <g transform="translate(720, 180)">
    <rect x="-50" y="-45" width="100" height="90" rx="8" fill="#e3f2fd" stroke="#0d47a1" stroke-width="2"/>
    <text x="0" y="-8" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="bold" fill="#0d47a1">Merge</text>
    <text x="0" y="16" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#666666">合并到原仓库</text>
  </g>

  <!-- 箭头 1：Fork -->
  <line x1="150" y1="180" x2="216" y2="180" stroke="#0d47a1" stroke-width="3" marker-end="url(#arrow-blue)"/>
  <text x="187" y="124" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="bold" fill="#0d47a1">Fork</text>

  <!-- 箭头 2：git clone -->
  <line x1="274" y1="180" x2="340" y2="180" stroke="#0d47a1" stroke-width="3" marker-end="url(#arrow-blue)"/>
  <text x="311" y="124" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Courier New', monospace" font-size="13" font-weight="bold" fill="#0d47a1">git clone</text>

  <!-- 箭头 3：修改 -->
  <line x1="398" y1="180" x2="464" y2="180" stroke="#0d47a1" stroke-width="3" marker-end="url(#arrow-blue)"/>
  <text x="435" y="124" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="bold" fill="#0d47a1">修改</text>

  <!-- 箭头 4：git push -->
  <line x1="522" y1="180" x2="588" y2="180" stroke="#0d47a1" stroke-width="3" marker-end="url(#arrow-blue)"/>
  <text x="559" y="124" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Courier New', monospace" font-size="13" font-weight="bold" fill="#0d47a1">git push</text>

  <!-- 箭头 5：Merge -->
  <line x1="646" y1="180" x2="712" y2="180" stroke="#0d47a1" stroke-width="3" marker-end="url(#arrow-blue)"/>
  <text x="683" y="124" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="bold" fill="#0d47a1">Merge</text>

  <!-- 底部说明 -->
  <text x="400" y="305" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#666666">Fork 复制仓库到个人账户，修改后通过 PR 请求原仓库维护者审阅并合并</text>
</svg>
<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" style="max-width:100%;height:auto;" preserveAspectRatio="xMidYMid meet">
  <title>分支与合并示意</title>
  <desc>展示从 main 分支切出 feature 分支进行实验，最后合并回 main 的完整过程。</desc>

  <!-- 背景 -->
  <rect width="800" height="420" fill="#fafafa"/>

  <!-- 标题 -->
  <text x="400" y="42" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="bold" fill="#0d47a1">分支与合并：安全地试错</text>

  <!-- main 分支线 -->
  <line x1="100" y1="260" x2="700" y2="260" stroke="#0d47a1" stroke-width="3"/>

  <!-- feature 分支曲线 -->
  <path d="M250,260 C250,140 330,140 350,140 L450,140 C470,140 550,140 550,260" fill="none" stroke="#42a5f5" stroke-width="3"/>

  <!-- main 提交点 -->
  <circle cx="150" cy="260" r="9" fill="#0d47a1"/>
  <circle cx="250" cy="260" r="9" fill="#0d47a1"/>
  <circle cx="550" cy="260" r="11" fill="#ef5350"/>
  <circle cx="650" cy="260" r="9" fill="#0d47a1"/>

  <!-- feature 提交点 -->
  <circle cx="350" cy="140" r="9" fill="#42a5f5"/>
  <circle cx="450" cy="140" r="9" fill="#42a5f5"/>

  <!-- main 标签 -->
  <text x="130" y="300" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Courier New', monospace" font-size="14" font-weight="bold" fill="#0d47a1">main</text>

  <!-- 提交说明 -->
  <text x="150" y="330" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#666666">c1</text>
  <text x="250" y="330" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#666666">c2</text>
  <text x="550" y="330" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="bold" fill="#ef5350">merge commit</text>
  <text x="650" y="330" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#666666">c3</text>

  <!-- feature 标签 -->
  <text x="400" y="100" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Courier New', monospace" font-size="14" font-weight="bold" fill="#42a5f5">feature</text>
  <text x="350" y="120" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#666666">实验 A</text>
  <text x="450" y="120" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#666666">实验 B</text>

  <!-- 分支/合并说明 -->
  <text x="250" y="360" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#666666">从这里切出分支</text>
  <text x="550" y="360" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#666666">实验完成后合并</text>

  <!-- 图例 -->
  <g transform="translate(560, 80)">
    <line x1="0" y1="0" x2="30" y2="0" stroke="#0d47a1" stroke-width="3"/>
    <circle cx="15" cy="0" r="6" fill="#0d47a1"/>
    <text x="40" y="5" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#333333">main 分支</text>

    <line x1="0" y1="25" x2="30" y2="25" stroke="#42a5f5" stroke-width="3"/>
    <circle cx="15" cy="25" r="6" fill="#42a5f5"/>
    <text x="40" y="30" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#333333">feature 分支</text>
  </g>
</svg>
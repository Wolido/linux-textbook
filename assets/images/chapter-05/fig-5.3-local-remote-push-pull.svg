<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" style="max-width:100%;height:auto;" preserveAspectRatio="xMidYMid meet">
  <title>本地仓库与远程仓库的 push/pull 关系</title>
  <desc>展示本地仓库与 GitHub 远程仓库之间 git push、git pull、git fetch 的方向与含义差异。</desc>

  <defs>
    <marker id="arrow-blue" markerWidth="8" markerHeight="10" refX="0" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,5 L0,10 Z" fill="#0d47a1"/>
    </marker>
    <marker id="arrow-light" markerWidth="8" markerHeight="10" refX="0" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,5 L0,10 Z" fill="#42a5f5"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="400" fill="#fafafa"/>

  <!-- 标题 -->
  <text x="400" y="42" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="bold" fill="#0d47a1">本地仓库与远程仓库的交互</text>

  <!-- 本地仓库 -->
  <g>
    <rect x="140" y="100" width="180" height="200" rx="10" fill="#e3f2fd" stroke="#0d47a1" stroke-width="2"/>
    <text x="230" y="135" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" font-weight="bold" fill="#0d47a1">本地仓库</text>
    <text x="230" y="158" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Courier New', monospace" font-size="13" fill="#1565c0">Local</text>

    <!-- 分支示意 -->
    <text x="230" y="195" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Courier New', monospace" font-size="14" fill="#333333">main</text>
    <circle cx="200" cy="220" r="7" fill="#0d47a1"/>
    <circle cx="230" cy="220" r="7" fill="#0d47a1"/>
    <circle cx="260" cy="220" r="7" fill="#0d47a1"/>
    <line x1="200" y1="220" x2="260" y2="220" stroke="#0d47a1" stroke-width="2"/>

    <text x="230" y="255" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Courier New', monospace" font-size="14" fill="#333333">feature</text>
    <circle cx="215" cy="280" r="7" fill="#42a5f5"/>
    <circle cx="245" cy="280" r="7" fill="#42a5f5"/>
    <line x1="215" y1="280" x2="245" y2="280" stroke="#42a5f5" stroke-width="2"/>
  </g>

  <!-- 远程仓库 -->
  <g>
    <rect x="480" y="100" width="180" height="200" rx="10" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
    <text x="570" y="135" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" font-weight="bold" fill="#1565c0">GitHub 远程仓库</text>
    <text x="570" y="158" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Courier New', monospace" font-size="13" fill="#42a5f5">Remote</text>

    <!-- 分支示意 -->
    <text x="570" y="195" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Courier New', monospace" font-size="14" fill="#333333">origin/main</text>
    <circle cx="540" cy="220" r="7" fill="#0d47a1"/>
    <circle cx="570" cy="220" r="7" fill="#0d47a1"/>
    <circle cx="600" cy="220" r="7" fill="#0d47a1"/>
    <line x1="540" y1="220" x2="600" y2="220" stroke="#0d47a1" stroke-width="2"/>

    <text x="570" y="255" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Courier New', monospace" font-size="14" fill="#333333">origin/feature</text>
    <circle cx="555" cy="280" r="7" fill="#42a5f5"/>
    <circle cx="585" cy="280" r="7" fill="#42a5f5"/>
    <line x1="555" y1="280" x2="585" y2="280" stroke="#42a5f5" stroke-width="2"/>
  </g>

  <!-- push 箭头：本地 -> 远程 -->
  <line x1="320" y1="165" x2="472" y2="165" stroke="#0d47a1" stroke-width="3" marker-end="url(#arrow-blue)"/>
  <text x="400" y="150" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Courier New', monospace" font-size="14" font-weight="bold" fill="#0d47a1">git push</text>
  <text x="400" y="182" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#666666">上传本地提交到远程</text>

  <!-- pull 箭头：远程 -> 本地 -->
  <line x1="480" y1="225" x2="328" y2="225" stroke="#0d47a1" stroke-width="3" marker-end="url(#arrow-blue)"/>
  <text x="400" y="210" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Courier New', monospace" font-size="14" font-weight="bold" fill="#0d47a1">git pull</text>
  <text x="400" y="242" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#666666">拉取远程提交并合并</text>

  <!-- fetch 箭头：远程 -> 本地（虚线） -->
  <line x1="480" y1="285" x2="328" y2="285" stroke="#42a5f5" stroke-width="3" stroke-dasharray="6,4" marker-end="url(#arrow-light)"/>
  <text x="400" y="270" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Courier New', monospace" font-size="14" font-weight="bold" fill="#42a5f5">git fetch</text>
  <text x="400" y="302" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#666666">只下载远程更新，不合并</text>

  <!-- 底部说明 -->
  <text x="400" y="365" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#666666">push 和 pull 会同步代码；fetch 只获取远程状态，适合先查看再合并</text>
</svg>
<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" width="800" style="max-width:100%;height:auto;" preserveAspectRatio="xMidYMid meet">
  <title>从 git add 到 git commit 的状态变化</title>
  <desc>展示一个文件从“未跟踪/已修改”到“已暂存”再到“已提交”的完整状态流转。</desc>

  <defs>
    <marker id="arrow-blue" markerWidth="8" markerHeight="10" refX="0" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,5 L0,10 Z" fill="#0d47a1"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="360" fill="#fafafa"/>

  <!-- 标题 -->
  <text x="400" y="42" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="bold" fill="#0d47a1">从 git add 到 git commit 的状态变化</text>

  <!-- 状态 1：未跟踪/已修改 -->
  <g transform="translate(180, 170)">
    <rect x="-80" y="-65" width="160" height="130" rx="10" fill="#e3f2fd" stroke="#42a5f5" stroke-width="2"/>
    <!-- 文件图标 -->
    <path d="M-20,-28 L10,-28 L22,-16 L22,18 L-20,18 Z" fill="#ffffff" stroke="#42a5f5" stroke-width="2"/>
    <path d="M10,-28 L10,-16 L22,-16" fill="none" stroke="#42a5f5" stroke-width="2"/>
    <!-- 状态文字 -->
    <text x="0" y="38" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="bold" fill="#0d47a1">未跟踪 / 已修改</text>
    <text x="0" y="58" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#666666">在工作区中编辑</text>
  </g>

  <!-- 状态 2：已暂存 -->
  <g transform="translate(400, 170)">
    <rect x="-80" y="-65" width="160" height="130" rx="10" fill="#1565c0"/>
    <!-- 文件图标 -->
    <path d="M-20,-28 L10,-28 L22,-16 L22,18 L-20,18 Z" fill="#ffffff" stroke="#ffffff" stroke-width="2"/>
    <path d="M10,-28 L10,-16 L22,-16" fill="none" stroke="#ffffff" stroke-width="2"/>
    <!-- 加号 -->
    <circle cx="18" cy="-34" r="10" fill="#ef5350"/>
    <path d="M18,-39 L18,-29 M13,-34 L23,-34" stroke="#ffffff" stroke-width="2"/>
    <!-- 状态文字 -->
    <text x="0" y="38" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="bold" fill="#ffffff">已暂存</text>
    <text x="0" y="58" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#e3f2fd">git add 后进入暂存区</text>
  </g>

  <!-- 状态 3：已提交 -->
  <g transform="translate(620, 170)">
    <rect x="-80" y="-65" width="160" height="130" rx="10" fill="#0d47a1"/>
    <!-- 文件图标 -->
    <path d="M-20,-28 L10,-28 L22,-16 L22,18 L-20,18 Z" fill="#ffffff" stroke="#ffffff" stroke-width="2"/>
    <path d="M10,-28 L10,-16 L22,-16" fill="none" stroke="#ffffff" stroke-width="2"/>
    <!-- 对勾 -->
    <circle cx="18" cy="-34" r="10" fill="#4caf50"/>
    <path d="M13,-34 L16,-31 L23,-38" fill="none" stroke="#ffffff" stroke-width="2"/>
    <!-- 状态文字 -->
    <text x="0" y="38" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="bold" fill="#ffffff">已提交</text>
    <text x="0" y="58" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#e3f2fd">git commit 后写入版本库</text>
  </g>

  <!-- 箭头 1：git add -->
  <line x1="260" y1="170" x2="312" y2="170" stroke="#0d47a1" stroke-width="3" marker-end="url(#arrow-blue)"/>
  <text x="290" y="96" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Courier New', monospace" font-size="14" font-weight="bold" fill="#0d47a1">git add</text>

  <!-- 箭头 2：git commit -->
  <line x1="480" y1="170" x2="532" y2="170" stroke="#0d47a1" stroke-width="3" marker-end="url(#arrow-blue)"/>
  <text x="510" y="96" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Courier New', monospace" font-size="14" font-weight="bold" fill="#0d47a1">git commit</text>

  <!-- 底部说明 -->
  <text x="400" y="305" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#666666">一个文件从修改到被 Git 永久记录，需要经过 add 与 commit 两步</text>
</svg>